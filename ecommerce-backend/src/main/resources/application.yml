server:
  port: ${PORT:8081}                 # Render injects PORT (e.g. 10000); 8081 is the local default
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: jl-ecommerce-backend

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:5MB}      # product image uploads
      max-request-size: ${MAX_REQUEST_SIZE:6MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jl_ecommerce}
    username: ${DB_USER:jl}
    password: ${DB_PASSWORD:jl}
    hikari:
      pool-name: jl-ecom-pool
      maximum-pool-size: ${DB_POOL_MAX:10}
      # Free-tier Supabase pauses when idle; the first request after a pause has
      # to wait for the DB to wake. 30s (was 10s) prevents a cold wake-up from
      # failing the request with a connection-timeout 500.
      connection-timeout: ${DB_CONN_TIMEOUT:30000}
      initialization-fail-timeout: 0     # don't crash startup if the DB is briefly waking
      keepalive-time: 120000             # ping idle connections so they stay alive

  jpa:
    # ── ENTITY-DEVELOPMENT PHASE (Step 4) ──
    # Hibernate generates the schema so the app boots and the tables match the
    # entities exactly. Once the model is confirmed, this is frozen into the
    # Flyway V2 migration and switched back to `validate` (Flyway owns schema).
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    # Paused during entity development (see note above). Re-enabled at the freeze step.
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100        # clamp ?size= so a client can't request a huge page (memory/DoS guard)
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}          # MailHog default; swap for real SMTP in prod
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ── Application-specific configuration (bound to typed @ConfigurationProperties) ──
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-a-long-random-secret-at-least-32-bytes}
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}     # ISO-8601 durations
    refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
    remember-me-refresh-ttl: ${JWT_REMEMBER_TTL:P30D}
    issuer: jl-ecommerce
  security:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}
    login:
      max-failed-attempts: ${LOGIN_MAX_FAILED:5}
      lock-duration: ${LOGIN_LOCK_DURATION:PT15M}
  otp:
    length: ${OTP_LENGTH:6}
    ttl: ${OTP_TTL:PT5M}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
  mail:
    from: ${MAIL_FROM:no-reply@jlenterprises.in}
    verification-base-url: ${MAIL_VERIFY_URL:http://localhost:8081/api/v1/auth/verify-email}
    # Where the password-reset email link points — your storefront reset page.
    # Set PASSWORD_RESET_URL to https://<your-vercel-domain>/reset-password.html in prod.
    password-reset-base-url: ${PASSWORD_RESET_URL:http://localhost:5500/reset-password.html}
  # Supabase Storage for product image uploads. Leave url/service-key blank to
  # disable uploads (the admin UI will report "image storage not configured").
  # service-key = the Supabase project's service_role key (server-side only).
  supabase:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_BUCKET:product-images}
  # Razorpay online payments. Leave blank for COD-only (Razorpay checkout stays off).
  # Use test keys first (rzp_test_...), then switch to live keys.
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}

springdoc:
  # API docs are disabled by default so they are NOT publicly exposed in production
  # (they map the whole API surface for an attacker). Set SWAGGER_ENABLED=true locally.
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Redis is optional (only used for OTP/verification). Without a Redis
    # instance its health check fails and drags /actuator/health to DOWN,
    # which makes Render treat the service as unhealthy. Disable it here;
    # re-enable (set true) once a Redis instance is configured.
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}

logging:
  level:
    in.jlenterprises.ecommerce: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
