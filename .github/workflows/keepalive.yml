name: Keep API awake

# Render's free tier sleeps a service after ~15 min idle, so the first request
# then pays a ~50s cold start. This pings the liveness probe on a schedule to keep
# it warm. Scheduled runs can be delayed a few minutes by GitHub — that's fine.
on:
  schedule:
    - cron: '*/12 * * * *'   # roughly every 12 minutes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping liveness
        run: |
          # --max-time is generous so a cold start still counts as a wake-up;
          # never fail the job (a slow/absent response shouldn't page anyone).
          curl -fsS --max-time 70 https://jl-enterprises-api.onrender.com/actuator/health/liveness || true
