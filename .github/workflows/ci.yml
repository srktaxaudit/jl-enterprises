name: CI

# Build + test gate. Informational only — it does not block the Render/Vercel
# auto-deploys, which run off the same push. Fix a red run before relying on it.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: mvn verify
        run: mvn -B -ntp -DskipITs verify

  mobile:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    # Informational until the RN app is fully typed; don't fail the whole run on it.
    continue-on-error: true
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
