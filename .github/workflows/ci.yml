name: CI

# Build + test gate. Informational only — it does not block the Render/Vercel
# auto-deploys, which run off the same push. Fix a red run before relying on it.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: mvn verify
        run: mvn -B -ntp -DskipITs verify

  mobile:
    name: ${{ matrix.app }} — typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [mobile, mobile-store]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      # Each app's .npmrc already sets legacy-peer-deps; npm ci needs the committed
      # package-lock.json (it hard-fails without one — which silently no-op'd this
      # job for months behind the old continue-on-error).
      - run: npm ci
      - run: npx tsc --noEmit
