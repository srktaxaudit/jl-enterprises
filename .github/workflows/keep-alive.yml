name: Keep-alive

# Prevents the Supabase free project from pausing after 7 days of inactivity, and
# helps keep the Render backend awake (fewer cold-start "Something went wrong").
# It pings a public endpoint that reads from the database, so it counts as DB activity.

on:
  schedule:
    - cron: "*/12 * * * *"   # roughly every 12 minutes (GitHub may delay/skip under load — fine for this)
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend (touches the database)
        run: |
          URL="https://jl-enterprises-api.onrender.com/api/v1/categories"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend + database are awake."
              exit 0
            fi
            sleep 30   # give a cold-starting backend time to wake, then retry
          done
          # The request itself already registered activity on the DB, so don't fail the run.
          echo "Did not get 200 (backend may be cold-starting); the ping still registered activity."
          exit 0
