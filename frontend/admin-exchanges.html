<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Exchange Requests — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .inp{border:1px solid #cbd5e1;border-radius:8px;padding:7px 10px;font-size:13px;outline:none} .inp:focus{border-color:#576cbc} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1100px] mx-auto p-4 md:p-7">
    <h1 class="text-2xl text-navy font-bold mb-1">Exchange Requests</h1>
    <p class="text-slate-400 text-sm mb-5">Review trade-in requests, set the final value, and approve or reject. Approved value becomes usable by the customer at checkout.</p>
    <div id="rows" class="space-y-4"></div>
  </div>

<script src="jl-ui.js"></script>
<script src="admin.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const inr = (n) => n==null ? "—" : "₹" + Math.round(Number(n||0)).toLocaleString("en-IN");
  const fmt = (iso)=>{ try { return new Date(iso).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}); } catch(_){ return ""; } };
  const STATUSES = ["PENDING","UNDER_REVIEW","INSPECTION_SCHEDULED","OFFER_SENT","APPROVED","REJECTED","COMPLETED","CANCELLED"];
  const TONE = { PENDING:"bg-blue-50 text-blue-700", UNDER_REVIEW:"bg-amber-50 text-amber-700", INSPECTION_SCHEDULED:"bg-violet-50 text-violet-700", OFFER_SENT:"bg-cyan-50 text-cyan-700", APPROVED:"bg-green-50 text-green-700", REJECTED:"bg-red-50 text-red-700", COMPLETED:"bg-slate-100 text-slate-600", CANCELLED:"bg-slate-100 text-slate-500" };

  async function load() {
    const box = $("rows");
    box.innerHTML = `<div class="py-8 text-center text-slate-400">${jlSpinnerHTML({label:"Loading exchange requests"})}</div>`;
    try {
      const page = await jlApi("/api/v1/admin/exchanges?size=100");
      const rows = page.content || [];
      box.innerHTML = rows.length ? rows.map(card).join("")
        : `<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-400 text-sm">No exchange requests yet.</div>`;
    } catch (e) { box.innerHTML = `<div class="text-red-600 text-sm py-4">Could not load (${esc(e.message)}).</div>`; }
  }

  function card(r) {
    const imgs = (r.imageUrls||[]).map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener"><img src="${esc(u)}" class="w-16 h-16 rounded-lg object-cover border border-slate-200" /></a>`).join("");
    const opts = STATUSES.map(s=>`<option value="${s}" ${s===r.status?"selected":""}>${s.replace(/_/g," ")}</option>`).join("");
    return `<div class="bg-white border border-slate-200 rounded-2xl p-5" data-id="${esc(r.id)}">
      <div class="flex items-start justify-between gap-3 flex-wrap">
        <div>
          <div class="flex items-center gap-2">
            <b class="text-navy">${esc(r.applianceCategory)}${r.brand?" · "+esc(r.brand):""}</b>
            <span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${TONE[r.status]||"bg-slate-100"}">${esc(r.status)}</span>
          </div>
          <div class="text-[12px] text-slate-500 mt-0.5">${esc(r.customerName||"")} · ${esc(r.customerEmail||"")} · ${fmt(r.createdAt)}</div>
        </div>
        <div class="text-right text-[13px]">
          <div class="text-slate-400">Estimate <b class="text-navy">${inr(r.estimatedValue)}</b></div>
          ${r.expectedValue!=null?`<div class="text-slate-400">Customer wants <b class="text-navy">${inr(r.expectedValue)}</b></div>`:""}
        </div>
      </div>

      <div class="grid sm:grid-cols-2 gap-x-6 gap-y-1 text-[13px] text-slate-600 mt-3">
        ${r.modelNumber?`<div>Model: <b>${esc(r.modelNumber)}</b></div>`:""}
        ${r.purchaseYear?`<div>Purchase year: <b>${esc(r.purchaseYear)}</b></div>`:""}
        <div>Condition: <b>${esc(r.conditionGrade||"—")}</b></div>
        <div>Working: <b>${r.working?"Yes":"No"}</b></div>
        ${r.desiredProductName?`<div class="sm:col-span-2">Wants to buy: <b>${esc(r.desiredProductName)}</b></div>`:""}
        ${r.reason?`<div class="sm:col-span-2">Reason: ${esc(r.reason)}</div>`:""}
        ${r.appliedOrderId?`<div class="sm:col-span-2 text-green-700">Applied to an order ✓</div>`:""}
      </div>
      ${imgs?`<div class="flex flex-wrap gap-2 mt-3">${imgs}</div>`:""}

      <div class="flex flex-wrap items-end gap-3 mt-4 pt-4 border-t border-slate-100">
        <div><label class="block text-[11px] text-slate-400 mb-1">Final value (₹)</label>
          <input class="inp w-32" data-val value="${r.finalValue!=null?esc(r.finalValue):""}" placeholder="${esc(r.estimatedValue)}" inputmode="numeric" /></div>
        <button data-save-val class="bg-slate-100 hover:bg-slate-200 text-navy font-semibold rounded-lg px-4 py-2 text-[13px]">Save value</button>
        <div class="flex-1"></div>
        <div><label class="block text-[11px] text-slate-400 mb-1">Status</label>
          <select class="inp" data-status>${opts}</select></div>
        <input class="inp w-48" data-notes placeholder="Internal note (optional)" value="${esc(r.internalNotes||"")}" />
        <button data-save-status class="bg-navy hover:bg-orange text-white font-semibold rounded-lg px-4 py-2 text-[13px] transition">Update</button>
      </div>
    </div>`;
  }

  $("rows").addEventListener("click", async (e) => {
    const wrap = e.target.closest("[data-id]"); if (!wrap) return;
    const id = wrap.dataset.id;
    if (e.target.closest("[data-save-val]")) {
      const v = wrap.querySelector("[data-val]").value.replace(/[^\d.]/g,"");
      if (v==="") { jlToast("Enter a value.", {type:"warn"}); return; }
      try { await jlApi(`/api/v1/admin/exchanges/${id}/value?value=${encodeURIComponent(v)}`, {method:"PATCH"}); jlToast("Value saved.", {type:"success"}); load(); }
      catch(err){ jlToast(err.message||"Failed", {type:"error"}); }
    } else if (e.target.closest("[data-save-status]")) {
      const status = wrap.querySelector("[data-status]").value;
      const notes = wrap.querySelector("[data-notes]").value.trim();
      try {
        await jlApi(`/api/v1/admin/exchanges/${id}/status?status=${encodeURIComponent(status)}${notes?"&notes="+encodeURIComponent(notes):""}`, {method:"PATCH"});
        jlToast("Status updated — customer notified.", {type:"success"}); load();
      } catch(err){ jlToast(err.message||"Failed", {type:"error"}); }
    }
  });

  jlWireLogout("#logoutBtn");
  jlRequireAdmin(["CUSTOMER_SUPPORT"]).then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    jlWithBusy(load);
  });
</script>
</body>
</html>
