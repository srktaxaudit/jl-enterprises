<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Inventory — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .lbl{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
  .inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;font-size:14px;outline:none} .inp:focus{border-color:#576cbc} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1000px] mx-auto p-4 md:p-7">
    <h1 class="text-2xl text-navy font-bold mb-1">Inventory</h1>
    <p class="text-slate-400 text-sm mb-5">Find a product to set its stock, and watch low-stock items.</p>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Find + edit -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <h2 class="text-navy font-semibold mb-3">Adjust stock</h2>
        <input id="search" placeholder="Search product by name/SKU…" class="inp mb-2" />
        <div id="results" class="text-sm max-h-48 overflow-auto"></div>

        <div id="editCard" class="hidden mt-4 border-t border-slate-100 pt-4">
          <div class="font-semibold text-navy mb-3" id="prodName"></div>
          <input type="hidden" id="productId" />
          <div class="grid grid-cols-2 gap-3">
            <div><label class="lbl">Quantity</label><input id="quantity" data-jl="digits" type="number" min="0" class="inp" /></div>
            <div><label class="lbl">Reorder level</label><input id="reorderLevel" data-jl="digits" type="number" min="0" class="inp" /></div>
          </div>
          <div class="mt-3"><label class="lbl">Warehouse / location</label><input id="warehouseLocation" class="inp" /></div>
          <button id="saveBtn" class="mt-4 bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-5 py-2.5 text-sm">Save stock</button>
        </div>
      </div>

      <!-- Low stock -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <h2 class="text-navy font-semibold mb-3">⚠️ Low stock</h2>
        <div id="low" class="text-sm"></div>
      </div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  function flash(t, ok=true){ const el=$("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }

  async function search(term){
    const box = $("results");
    if(!term){ box.innerHTML=""; return; }
    try {
      const page = await jlApi(`/api/v1/admin/products?size=10&search=${encodeURIComponent(term)}`);
      const rows = page.content || [];
      box.innerHTML = rows.length ? rows.map(p=>`
        <button data-pick="${p.id}" data-name="${esc(p.name)}" class="block w-full text-left px-2 py-1.5 rounded hover:bg-slate-50">
          <b class="text-navy">${esc(p.name)}</b> <span class="text-slate-400">· ${esc(p.sku)}</span></button>`).join("")
        : '<div class="text-slate-400 py-1">No matches.</div>';
    } catch(e){ box.innerHTML = `<div class="text-red-600">${esc(e.message)}</div>`; }
  }

  async function pick(productId, name){
    try {
      const inv = await jlApi(`/api/v1/admin/inventory/${productId}`);
      $("productId").value = inv.productId;
      $("prodName").textContent = inv.productName + `  (available: ${inv.available})`;
      $("quantity").value = inv.quantity;
      $("reorderLevel").value = inv.reorderLevel;
      $("warehouseLocation").value = inv.warehouseLocation || "";
      $("editCard").classList.remove("hidden");
      // Product picked → collapse the results list and show the chosen name in the search box.
      $("results").innerHTML = "";
      $("search").value = name || inv.productName;
      $("quantity").focus();
    } catch(e){ flash(e.message||"No stock record", false); }
  }

  async function loadLow(){
    $("low").innerHTML = `<div style="text-align:center;padding:20px">${jlSpinnerHTML()}</div>`;
    try {
      const low = await jlApi("/api/v1/admin/inventory/low-stock");
      $("low").innerHTML = low.length ? low.map(p=>`
        <div class="flex items-center gap-3 py-2 border-t border-slate-100 first:border-0">
          <div class="flex-1"><b class="text-navy text-[13px]">${esc(p.productName)}</b>
            <span class="text-[12px] text-slate-400 block">reorder at ${p.reorderLevel}</span></div>
          <b class="text-red-600">${p.available} left</b></div>`).join("")
        : '<div class="text-slate-400">All good — nothing below reorder level. 🎉</div>';
    } catch(e){ $("low").innerHTML = `<div class="text-slate-400">Couldn't load low-stock items right now. Please refresh in a moment.</div>`; }
  }

  $("results").addEventListener("click", (ev)=>{ const b=ev.target.closest("button[data-pick]"); if(b) pick(b.dataset.pick, b.dataset.name); });

  const INV_RULES = { quantity:[jlV.required(), jlV.integer({min:0})], reorderLevel:[jlV.required(), jlV.integer({min:0})] };
  jlField($("quantity"), INV_RULES.quantity);
  jlField($("reorderLevel"), INV_RULES.reorderLevel);

  $("saveBtn").addEventListener("click", async ()=>{
    if(!jlValidate($("editCard"), INV_RULES).valid) return;
    const body = { quantity:Number($("quantity").value), reorderLevel:Number($("reorderLevel").value), warehouseLocation:$("warehouseLocation").value.trim()||null };
    const saveBtn = $("saveBtn");
    try { jlBtn(saveBtn, true); await jlApi(`/api/v1/admin/inventory/${$("productId").value}`, {method:"PUT", body}); jlToast("Stock updated.",{type:"success"}); loadLow(); }
    catch(e){ if(e.errors) jlShowServerErrors($("editCard"), e.errors); flash(e.message||"Save failed", false); }
    finally { jlBtn(saveBtn, false); }
  });
  let timer; $("search").addEventListener("input", (e)=>{ clearTimeout(timer); const v=e.target.value.trim(); timer=setTimeout(()=>search(v),300); });

  jlWireLogout("#logoutBtn");
  jlRequireAdmin().then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    jlWithBusy(loadLow);
  });
</script>
</body>
</html>
