<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>JL Enterprises — Admin</title>
<!-- Installable admin app (PWA) -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b2447" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="JL Admin" />
<link rel="apple-touch-icon" href="jl-admin-icon.svg" />
<link rel="icon" href="jl-admin-icon.svg" />
<!-- Apply the saved (or system) theme before first paint to avoid a light flash. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("jl-admin-theme");
      if (t !== "dark" && t !== "light") t = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      var e = document.documentElement;
      e.setAttribute("data-theme", t);
      e.style.colorScheme = t;
    } catch (_) {}
  })();
</script>
<script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("admin-sw.js").catch(function(){});});}</script>
<link rel="stylesheet" href="admin-shell.css" />
<style>
  /* "Needs attention" badges on sidebar links */
  .admin-nav a { position: relative; }
  .nav-badge {
    margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px;
    background: #f97316; color: #fff; font-size: 11px; font-weight: 700;
    line-height: 18px; text-align: center; border-radius: 999px; flex: none;
  }
  /* When the sidebar is collapsed (icons only), pin the badge to the icon corner. */
  .admin-shell.collapsed .nav-badge {
    position: absolute; top: 3px; right: 5px; margin: 0;
    min-width: 15px; height: 15px; line-height: 15px; font-size: 9px; padding: 0 3px;
  }
</style>
</head>
<body>
  <div class="admin-shell" id="adminShell">
    <div class="admin-scrim" id="adminScrim" aria-hidden="true"></div>
    <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin navigation">
      <div class="admin-brand">
        <div class="admin-logo">JL</div>
        <div class="admin-brand-copy"><strong>JL ENTERPRISES</strong><span>CEO CONTROL CENTRE</span></div>
        <button class="admin-collapse" id="collapseBtn" type="button" aria-label="Collapse sidebar" title="Collapse sidebar">‹</button>
      </div>
      <nav class="admin-nav" id="adminNav"></nav>
      <div class="admin-sidebar-footer">
        <a href="index.html" target="_top"><span>↗</span><b>View store</b></a>
        <button id="shellLogout" type="button"><span>⎋</span><b>Logout</b></button>
      </div>
    </aside>

    <section class="admin-workspace">
      <header class="admin-topbar">
        <button class="admin-menu" id="menuBtn" type="button" aria-label="Open navigation" aria-controls="adminSidebar" aria-expanded="false">☰</button>
        <div class="admin-page-title" id="pageTitle">Dashboard</div>
        <div class="admin-topbar-spacer"></div>
        <span class="admin-status"><i></i> Admin panel</span>
        <button id="themeBtn" class="admin-theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark / light theme">🌙</button>
        <button id="bellBtn" type="button" aria-label="Notifications" title="Notifications"
          style="position:relative;background:none;border:0;cursor:pointer;font-size:18px;line-height:1;padding:6px;margin-right:2px;">
          🔔
          <span id="bellBadge" hidden
            style="position:absolute;top:-1px;right:-1px;min-width:16px;height:16px;padding:0 4px;background:#f97316;color:#fff;font-size:10px;font-weight:700;border-radius:999px;line-height:16px;text-align:center;">0</span>
        </button>
        <span class="admin-avatar" id="shellBadge" title="">··</span>
      </header>
      <main class="admin-content" id="adminContent">
        <iframe id="adminFrame" name="adminFrame" title="Admin dashboard content"></iframe>
      </main>
    </section>
  </div>
  <script src="jl-ui.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
  <script src="admin-shell.js"></script>
</body>
</html>
