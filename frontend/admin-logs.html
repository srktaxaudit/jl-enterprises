<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Activity Logs — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .chip{display:inline-block;font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1100px] mx-auto p-4 md:p-7">
    <div class="flex items-center gap-3 mb-5">
      <div><h1 class="text-2xl text-navy font-bold mb-1">Activity Logs</h1>
        <p class="text-slate-400 text-sm">Every admin action — who did what, when, and from where.</p></div>
      <button id="refreshBtn" class="ml-auto bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-4 py-2 text-sm">↻ Refresh</button>
    </div>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
            <th class="py-2">When</th><th>Actor</th><th>Action</th><th>Entity</th><th>Detail</th><th>IP</th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="py-6 text-center text-slate-400"></td></tr></tbody>
        </table>
      </div>
      <div class="flex items-center gap-2 mt-4 text-sm">
        <button id="prevBtn" class="border border-slate-300 rounded-lg px-3 py-1.5 disabled:opacity-40">← Prev</button>
        <span id="pageInfo" class="text-slate-500"></span>
        <button id="nextBtn" class="border border-slate-300 rounded-lg px-3 py-1.5 disabled:opacity-40">Next →</button>
      </div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  let PAGE = 0;
  const SIZE = 50;
  let TOTAL_PAGES = 1;

  const actionColor = (a) => {
    a = String(a||"");
    if (a.startsWith("DELETE")) return "bg-red-50 text-red-700";
    if (a.startsWith("CREATE")) return "bg-green-50 text-green-700";
    if (a.startsWith("UPDATE") || a.startsWith("CHANGE")) return "bg-amber-50 text-amber-700";
    return "bg-slate-100 text-slate-600";
  };
  const fmt = (iso) => { if(!iso) return "—"; const d = new Date(iso);
    return isNaN(d) ? esc(iso) : d.toLocaleString(); };

  async function load(){
    const body = $("rows");
    body.innerHTML = `<tr><td colspan="6" class="py-6 text-center text-slate-400">${jlSpinnerHTML({label:"Loading activity logs"})}</td></tr>`;
    try {
      const page = await jlApi(`/api/v1/admin/audit-logs?page=${PAGE}&size=${SIZE}`);
      const rows = page.content || [];
      TOTAL_PAGES = Math.max(1, page.totalPages || 1);
      body.innerHTML = rows.length ? rows.map(r=>`
        <tr class="border-t border-slate-100 align-top">
          <td class="py-2.5 text-slate-500 whitespace-nowrap">${fmt(r.createdAt)}</td>
          <td class="text-navy font-medium">${esc(r.actor||"system")}</td>
          <td><span class="chip ${actionColor(r.action)}">${esc(r.action||"")}</span></td>
          <td class="text-slate-600">${esc(r.entity||"")}${r.entityId?`<div class="text-[11px] text-slate-400">${esc(r.entityId)}</div>`:""}</td>
          <td class="text-[12px] text-slate-500 max-w-[280px] truncate" title="${esc(r.detail||"")}">${esc(r.detail||"")}</td>
          <td class="text-[12px] text-slate-400">${esc(r.ipAddress||"—")}</td>
        </tr>`).join("") : `<tr><td colspan="6" class="py-4 text-slate-400">No activity recorded yet.</td></tr>`;
      $("pageInfo").textContent = `Page ${PAGE+1} of ${TOTAL_PAGES}`;
      $("prevBtn").disabled = PAGE <= 0;
      $("nextBtn").disabled = PAGE >= TOTAL_PAGES - 1;
    } catch(e){ body.innerHTML = `<tr><td colspan="6" class="py-4 text-red-600">Could not load logs (${esc(e.message)}).</td></tr>`; }
  }

  $("refreshBtn").addEventListener("click", ()=>{ PAGE=0; load(); });
  $("prevBtn").addEventListener("click", ()=>{ if(PAGE>0){ PAGE--; load(); } });
  $("nextBtn").addEventListener("click", ()=>{ if(PAGE<TOTAL_PAGES-1){ PAGE++; load(); } });

  jlWireLogout("#logoutBtn");
  jlRequireSuper().then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    load();
  });
</script>
</body>
</html>
