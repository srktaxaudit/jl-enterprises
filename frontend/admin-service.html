<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Service Bookings — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; } </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1000px] mx-auto p-4 md:p-7">
    <div class="mb-5"><h1 class="text-2xl text-navy font-bold mb-1">Service Bookings</h1>
      <p class="text-slate-400 text-sm">Repair / installation / AMC requests from the storefront.</p></div>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <div id="rows" class="space-y-3"></div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  const fmt = (iso) => { try { return new Date(iso).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}); } catch(_){ return "—"; } };
  const STATUSES = ["NEW","CONTACTED","SCHEDULED","DONE","CANCELLED"];
  const badge = { NEW:"bg-amber-100 text-amber-700", CONTACTED:"bg-blue-100 text-blue-700", SCHEDULED:"bg-indigo-100 text-indigo-700", DONE:"bg-green-100 text-green-700", CANCELLED:"bg-red-100 text-red-700" };

  function flash(t, ok=true){ const el=$("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }

  async function load(){
    const box = $("rows");
    box.innerHTML = `<div class="py-6 text-center">${jlSpinnerHTML({label:"Loading bookings"})}</div>`;
    try {
      const page = await jlApi("/api/v1/service-bookings?size=100");
      const rows = page.content || [];
      box.innerHTML = rows.length ? rows.map(b=>`
        <div class="border border-slate-200 rounded-xl p-4">
          <div class="flex items-center gap-2 flex-wrap">
            <b class="text-navy">${esc(b.customerName)}</b>
            <a href="tel:${esc(b.phone)}" class="text-brand text-sm">${esc(b.phone)}</a>
            <span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${badge[b.bookingStatus]||"bg-slate-100 text-slate-600"}">${esc(b.bookingStatus)}</span>
            <span class="ml-auto text-[12px] text-slate-400">${fmt(b.createdAt)}</span>
          </div>
          <div class="text-[13px] text-slate-600 mt-1">${esc(b.serviceType||"—")}${b.preferredDate?` · Preferred: <b>${esc(b.preferredDate)}</b>`:""}</div>
          ${b.message?`<p class="text-[13px] text-slate-500 mt-1">${esc(b.message)}</p>`:""}
          <div class="mt-2 flex items-center gap-2">
            <label class="text-[12px] text-slate-400">Set status:</label>
            <select data-id="${b.id}" class="statusSel rounded-lg border border-slate-300 px-2 py-1 text-[12px]">
              ${STATUSES.map(s=>`<option value="${s}" ${s===b.bookingStatus?"selected":""}>${s}</option>`).join("")}
            </select>
          </div>
        </div>`).join("") : `<p class="text-slate-400 text-sm py-4">No service bookings yet.</p>`;
    } catch(e){ box.innerHTML = `<p class="text-red-600 text-sm py-4">Could not load (${esc(e.message)}).</p>`; }
  }

  $("rows").addEventListener("change", async (ev)=>{
    const sel = ev.target.closest(".statusSel"); if(!sel) return;
    try { await jlApi(`/api/v1/service-bookings/${sel.dataset.id}/status?status=${sel.value}`, {method:"PATCH"}); jlToast("Status updated.", {type:"success"}); load(); }
    catch(e){ flash(e.message||"Update failed", false); }
  });

  jlWireLogout("#logoutBtn");
  jlRequireAdmin().then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    jlWithBusy(load);
  });
</script>
</body>
</html>
