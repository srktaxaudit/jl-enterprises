<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Reviews — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; } </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1000px] mx-auto p-4 md:p-7">
    <div class="flex items-center gap-3 mb-5 flex-wrap">
      <div><h1 class="text-2xl text-navy font-bold mb-1">Reviews</h1>
        <p class="text-slate-400 text-sm">Approve or reject customer reviews before they appear on the storefront.</p></div>
      <select id="statusFilter" class="ml-auto rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <option value="PENDING">Pending</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
      </select>
    </div>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <div id="rows" class="space-y-4"></div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  const fmt = (iso) => { try { return new Date(iso).toLocaleDateString("en-IN",{dateStyle:"medium"}); } catch(_){ return "—"; } };

  function flash(t, ok=true){ const el=$("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }

  async function load(){
    const status = $("statusFilter").value;
    const box = $("rows");
    box.innerHTML = `<div class="py-6 text-center">${jlSpinnerHTML({label:"Loading reviews"})}</div>`;
    try {
      const page = await jlApi(`/api/v1/admin/reviews?status=${status}&size=50`);
      const rows = page.content || [];
      box.innerHTML = rows.length ? rows.map(r=>`
        <div class="border border-slate-200 rounded-xl p-4">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-amber text-sm">${"★".repeat(r.rating)}<span class="text-slate-300">${"★".repeat(5-r.rating)}</span></span>
            ${r.title?`<b class="text-navy text-sm">${esc(r.title)}</b>`:""}
            ${r.verifiedPurchase?'<span class="text-[11px] text-green-600 font-semibold">✓ Verified</span>':""}
            <span class="ml-auto text-[12px] text-slate-400">${esc(r.reviewerName||"Customer")} · ${fmt(r.createdAt)}</span>
          </div>
          ${r.comment?`<p class="text-slate-600 text-sm mt-1">${esc(r.comment)}</p>`:""}
          <div class="mt-3 flex gap-2">
            ${status!=="APPROVED"?`<button data-approve="${r.id}" class="bg-green-600 hover:bg-green-700 text-white text-[12px] font-semibold rounded-lg px-3 py-1.5">✓ Approve</button>`:""}
            ${status!=="REJECTED"?`<button data-reject="${r.id}" class="bg-red-600 hover:bg-red-700 text-white text-[12px] font-semibold rounded-lg px-3 py-1.5">✕ Reject</button>`:""}
          </div>
        </div>`).join("") : `<p class="text-slate-400 text-sm py-4">No ${status.toLowerCase()} reviews.</p>`;
    } catch(e){ box.innerHTML = `<p class="text-red-600 text-sm py-4">Could not load (${esc(e.message)}).</p>`; }
  }

  $("rows").addEventListener("click", async (ev)=>{
    const b = ev.target.closest("button"); if(!b) return;
    const id = b.dataset.approve || b.dataset.reject;
    const status = b.dataset.approve ? "APPROVED" : "REJECTED";
    try { await jlApi(`/api/v1/admin/reviews/${id}/moderate?status=${status}`, {method:"PATCH"}); jlToast("Review "+status.toLowerCase()+".", {type:"success"}); load(); }
    catch(e){ flash(e.message||"Action failed", false); }
  });

  $("statusFilter").addEventListener("change", load);

  jlWireLogout("#logoutBtn");
  jlRequireAdmin(["MARKETING_MANAGER","CUSTOMER_SUPPORT"]).then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    jlWithBusy(load);
  });
</script>
</body>
</html>
