<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Orders — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; } </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1100px] mx-auto p-4 md:p-7">
    <h1 class="text-2xl text-navy font-bold mb-1">Orders</h1>
    <p class="text-slate-400 text-sm mb-5">View orders and advance their status.</p>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <div class="flex flex-wrap items-end gap-3 mb-4">
        <h2 class="text-navy font-semibold w-full">All orders</h2>
        <label class="text-[11px] text-slate-500">Status<br>
          <select id="statusFilter" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm"><option value="">All statuses</option></select></label>
        <label class="text-[11px] text-slate-500">Payment<br>
          <select id="payFilter" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm">
            <option value="">All payments</option><option value="PENDING">Pending</option><option value="SUCCESS">Paid</option><option value="FAILED">Failed</option><option value="REFUNDED">Refunded</option>
          </select></label>
        <label class="text-[11px] text-slate-500">From<br><input id="fromDate" type="date" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm" /></label>
        <label class="text-[11px] text-slate-500">To<br><input id="toDate" type="date" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm" /></label>
        <label class="text-[11px] text-slate-500">Sort<br>
          <select id="sortSel" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm">
            <option value="placedAt,desc">Newest first</option><option value="placedAt,asc">Oldest first</option>
            <option value="grandTotal,desc">Amount: high to low</option><option value="grandTotal,asc">Amount: low to high</option>
          </select></label>
        <button id="clearFilters" class="text-[12px] text-brand hover:underline pb-1.5">Clear</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
            <th class="py-2">Order</th><th>Placed</th><th>Items</th><th class="text-right">Total</th><th>Status</th><th class="text-right">Update</th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="6" style="text-align:center;padding:20px"></td></tr></tbody>
        </table>
      </div>
      <div class="flex items-center justify-between mt-4 text-sm">
        <button id="prev" class="px-3 py-1.5 rounded border border-slate-300 disabled:opacity-40">← Prev</button>
        <span id="pageInfo" class="text-slate-400"></span>
        <button id="next" class="px-3 py-1.5 rounded border border-slate-300 disabled:opacity-40">Next →</button>
      </div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script>
  const STATUSES = ["PENDING","CONFIRMED","PROCESSING","PACKED","SHIPPED","OUT_FOR_DELIVERY","DELIVERED","CANCELLED","RETURN_REQUESTED","RETURNED","REFUNDED","FAILED_PAYMENT"];
  const STYLE = { PENDING:"bg-blue-50 text-blue-700", CONFIRMED:"bg-cyan-50 text-cyan-700", PROCESSING:"bg-sky-50 text-sky-700", PACKED:"bg-amber-50 text-amber-700",
    SHIPPED:"bg-violet-50 text-violet-700", OUT_FOR_DELIVERY:"bg-purple-50 text-purple-700", DELIVERED:"bg-green-50 text-green-700",
    CANCELLED:"bg-red-50 text-red-700", RETURN_REQUESTED:"bg-orange-50 text-orange-700", RETURNED:"bg-rose-50 text-rose-700",
    REFUNDED:"bg-slate-100 text-slate-600", FAILED_PAYMENT:"bg-red-100 text-red-700" };
  const inr = (n) => "₹" + Math.round(Number(n||0)).toLocaleString("en-IN");
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const fmt = (iso) => { try { return new Date(iso).toLocaleDateString("en-IN",{dateStyle:"medium"}); } catch(_){ return "—"; } };
  const state = { page: 0, size: 20, totalPages: 1 };

  function flash(t, ok=true){ const el=document.getElementById("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }

  document.getElementById("statusFilter").innerHTML =
    '<option value="">All statuses</option>' + STATUSES.map(s=>`<option value="${s}">${s}</option>`).join("");

  async function load(){
    const status = document.getElementById("statusFilter").value;
    const pay = document.getElementById("payFilter").value;
    const from = document.getElementById("fromDate").value;
    const to = document.getElementById("toDate").value;
    const sort = document.getElementById("sortSel").value;
    const q = `?page=${state.page}&size=${state.size}&sort=${sort}`
      + (status?`&status=${status}`:"") + (pay?`&paymentStatus=${pay}`:"")
      + (from?`&from=${from}`:"") + (to?`&to=${to}`:"");
    const body = document.getElementById("rows");
    body.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:20px">${jlSpinnerHTML()}</td></tr>`;
    try {
      const page = await jlApi("/api/v1/admin/orders" + q);
      state.totalPages = page.totalPages || 1;
      const rows = page.content || [];
      body.innerHTML = rows.length ? rows.map(o=>`
        <tr class="border-t border-slate-100">
          <td class="py-2.5 font-bold text-navy">#${esc(o.orderNumber)}</td>
          <td class="text-slate-500">${fmt(o.placedAt)}</td>
          <td class="text-slate-500">${o.itemCount}</td>
          <td class="text-right font-bold text-navy">${inr(o.grandTotal)}</td>
          <td><span class="inline-block text-[11px] font-semibold px-2 py-0.5 rounded-full ${STYLE[o.status]||"bg-slate-100"}">${esc(o.status)}</span></td>
          <td class="text-right whitespace-nowrap">
            ${o.status === "RETURN_REQUESTED"
              ? `<button data-approve="${o.id}" class="text-[12px] bg-green-600 text-white rounded px-2 py-1 mr-1">✓ Approve</button>
                 <button data-reject="${o.id}" class="text-[12px] bg-red-600 text-white rounded px-2 py-1 mr-1">✗ Reject</button>`
              : `<select data-sel="${o.id}" class="rounded border border-slate-300 text-[12px] px-1.5 py-1 mr-1">
                   ${STATUSES.map(s=>`<option value="${s}" ${s===o.status?"selected":""}>${s}</option>`).join("")}
                 </select>
                 <button data-upd="${o.id}" class="text-[12px] bg-navy text-white rounded px-2 py-1">Set</button>`}
            <button data-note="${o.id}" title="Internal note" class="text-[12px] text-slate-500 border border-slate-300 rounded px-2 py-1 ml-1">📝</button>
          </td>
        </tr>`).join("") : `<tr><td colspan="6" class="py-4 text-slate-400">No orders.</td></tr>`;
      document.getElementById("pageInfo").textContent = `Page ${state.page+1} of ${state.totalPages}`;
      document.getElementById("prev").disabled = page.first;
      document.getElementById("next").disabled = page.last;
    } catch(e){ body.innerHTML = `<tr><td colspan="6" class="py-4 text-red-600">Could not load orders (${esc(e.message)}).</td></tr>`; }
  }

  document.getElementById("rows").addEventListener("click", async (ev)=>{
    const b = ev.target.closest("button"); if(!b) return;
    try {
      if(b.dataset.upd){
        const status = document.querySelector(`[data-sel="${b.dataset.upd}"]`).value;
        await jlApi(`/api/v1/admin/orders/${b.dataset.upd}/status?status=${status}`, {method:"PATCH"}); jlToast("Status updated.",{type:"success"}); load();
      } else if(b.dataset.approve){
        if(!(await jlConfirm("Approve this return? Stock will be restored and payment refunded.",{title:"Approve return",confirmText:"Approve",danger:true}))) return;
        await jlApi(`/api/v1/admin/orders/${b.dataset.approve}/return/approve`, {method:"POST"}); jlToast("Return approved.",{type:"success"}); load();
      } else if(b.dataset.reject){
        const reason = await jlPrompt("Reason for rejecting the return:",{title:"Reject return",required:false}); if(reason===null) return;
        await jlApi(`/api/v1/admin/orders/${b.dataset.reject}/return/reject?reason=${encodeURIComponent(reason)}`, {method:"POST"}); jlToast("Return rejected.",{type:"success"}); load();
      } else if(b.dataset.note){
        const notes = await jlPrompt("Internal note for this order (staff-only):",{title:"Internal note",required:false}); if(notes===null) return;
        await jlApi(`/api/v1/admin/orders/${b.dataset.note}/notes?notes=${encodeURIComponent(notes)}`, {method:"PATCH"}); jlToast("Note saved.",{type:"success"});
      }
    } catch(e){ flash(e.message||"Action failed", false); }
  });
  ["statusFilter","payFilter","fromDate","toDate","sortSel"].forEach(id =>
    document.getElementById(id).addEventListener("change", ()=>{ state.page=0; load(); }));
  document.getElementById("clearFilters").addEventListener("click", ()=>{
    ["statusFilter","payFilter","fromDate","toDate"].forEach(id => document.getElementById(id).value="");
    document.getElementById("sortSel").value="placedAt,desc"; state.page=0; load();
  });
  document.getElementById("prev").addEventListener("click", ()=>{ if(state.page>0){state.page--; load();} });
  document.getElementById("next").addEventListener("click", ()=>{ if(state.page<state.totalPages-1){state.page++; load();} });

  jlWireLogout("#logoutBtn");
  jlRequireAdmin().then((a)=>{
    document.getElementById("adminBadge").textContent =
      (jlDisplayName(a)).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    jlWithBusy(load);
  });
</script>
</body>
</html>
