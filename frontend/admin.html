<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>JL Enterprises — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { DEFAULT: "#0b2447", 600: "#19376d" },
          brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
          orange: { DEFAULT: "#f97316", 600: "#ea580c" },
          amber: { DEFAULT: "#fbbf24" },
        },
        boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" },
      },
    },
  };
</script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body class="text-slate-800">

<!-- This page renders only the DASHBOARD content; the persistent shell
     (admin-shell.html) provides the sidebar + top bar. -->
<div class="bg-[#eef1f6] min-h-screen p-4 md:p-7">
      <!-- Filled per-role by the script below — every staff member used to see the
           hardcoded "Super-Admin" banner regardless of who they were. -->
      <div id="roleBanner" class="bg-emerald-50 border border-emerald-200 text-emerald-800 text-[13px] text-center py-2 rounded-xl mb-5">
        Live data from the JL Enterprises API.
      </div>
      <h2 id="greeting" class="text-2xl text-navy font-bold mb-1">Welcome back 👋</h2>
      <p class="text-slate-400 text-sm mb-5">Here's what's happening at JL Enterprises today.</p>

      <!-- STAT CARDS -->
      <div id="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6"></div>

      <div class="grid md:grid-cols-[1.6fr_1fr] gap-5">
        <!-- RECENT ORDERS -->
        <div class="bg-white border border-slate-200 rounded-2xl p-5">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-navy font-semibold">Recent Orders</h3>
            <a href="admin-orders.html" class="text-brand text-[13px] hover:underline">All orders →</a>
          </div>
          <table class="w-full text-sm">
            <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
              <th class="py-2">Order</th><th>Items</th><th>Status</th><th class="text-right">Amount</th>
            </tr></thead>
            <tbody id="orders"></tbody>
          </table>
        </div>

        <!-- LOW STOCK -->
        <div class="bg-white border border-slate-200 rounded-2xl p-5">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-navy font-semibold">⚠️ Low Stock</h3>
            <a href="admin-inventory.html" class="text-brand text-[13px] hover:underline">Inventory →</a>
          </div>
          <div id="lowstock"></div>
        </div>
      </div>
</div>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script>
  // ── Auth guard + time-aware greeting. The persistent shell (admin-shell.js)
  //    owns the sidebar, top bar and logout; this page is only the dashboard.
  jlRequireAdmin().then((admin) => {
    const h = new Date().getHours();
    const part = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
    const greet = document.getElementById("greeting");
    if (greet) greet.textContent = `${part}, ${jlDisplayName(admin)} 👋`;
    // Role-accurate banner (was hardcoded "Super-Admin" for everyone).
    const banner = document.getElementById("roleBanner");
    if (banner) {
      const roleLabel = jlIsSuper(admin)
        ? "👑 Super-Admin — full visibility across every team."
        : "Signed in as " + ((admin.roles || [])
            .map((r) => String(r).replace(/^ROLE_/, "").replace(/_/g, " ").toLowerCase()
              .replace(/\b\w/g, (c) => c.toUpperCase())).join(", ") || "Staff") + ".";
      banner.textContent = roleLabel + " Live data from the JL Enterprises API.";
    }
  });

  const inr = (n) => "₹" + Math.round(n).toLocaleString("en-IN");

  // ── Live dashboard data (from the backend) ──
  const STATUS_STYLE = {
    PENDING:"bg-blue-50 text-blue-700", CONFIRMED:"bg-cyan-50 text-cyan-700", PROCESSING:"bg-sky-50 text-sky-700",
    PACKED:"bg-amber-50 text-amber-700", SHIPPED:"bg-violet-50 text-violet-700", OUT_FOR_DELIVERY:"bg-purple-50 text-purple-700",
    DELIVERED:"bg-green-50 text-green-700", CANCELLED:"bg-red-50 text-red-700",
    RETURN_REQUESTED:"bg-orange-50 text-orange-700", RETURNED:"bg-rose-50 text-rose-700",
    REFUNDED:"bg-slate-100 text-slate-600", FAILED_PAYMENT:"bg-red-100 text-red-700",
  };
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function statCard(label, value, sub) {
    return `<div class="bg-white border border-slate-200 rounded-2xl p-4">
      <div class="text-[12px] text-slate-400 uppercase tracking-wide font-semibold">${label}</div>
      <div class="text-2xl font-extrabold text-navy mt-1">${value}</div>
      <div class="text-[12px] text-slate-400 mt-0.5">${sub}</div></div>`;
  }

  async function loadStats() {
    try {
      const s = await jlApi("/api/v1/admin/dashboard/stats");
      document.getElementById("stats").innerHTML = [
        statCard("Revenue (30d)", inr(Number(s.revenueLast30Days || 0)), `${s.ordersLast30Days} orders`),
        statCard("Orders", String(s.totalOrders), "all time"),
        statCard("Pending", String(s.pendingOrders), "to fulfil"),
        statCard("Processing", String(s.processingOrders ?? 0), "being prepared"),
        statCard("Delivered", String(s.deliveredOrders ?? 0), "completed"),
        statCard("Cancelled", String(s.cancelledOrders ?? 0), "cancelled"),
        statCard("Returned", String(s.returnedOrders ?? 0), "returned"),
        statCard("Products", String(s.totalProducts), `${s.totalInventoryItems ?? 0} inventory items`),
        statCard("In Stock", String(s.inStockCount ?? 0), "available now"),
        statCard("Low Stock", String(s.lowStockCount), "need restock"),
        statCard("Out of Stock", String(s.outOfStockCount ?? 0), "unavailable"),
        statCard("Customers", String(s.totalUsers), "total users"),
      ].join("");
    } catch (e) {
      document.getElementById("stats").innerHTML =
        `<div class="col-span-full text-red-600 text-sm">Could not load stats (${esc(e.message)}).</div>`;
    }
  }

  async function loadRecentOrders() {
    try {
      const page = await jlApi("/api/v1/admin/orders?size=6");
      const rows = page.content || [];
      document.getElementById("orders").innerHTML = rows.length ? rows.map(o => `
        <tr class="border-t border-slate-100">
          <td class="py-2.5 font-bold text-navy">#${esc(o.orderNumber)}</td>
          <td class="text-slate-500 text-[12px]">${o.itemCount} item(s)</td>
          <td><span class="inline-block text-[11px] font-semibold px-2 py-0.5 rounded-full ${STATUS_STYLE[o.status] || "bg-slate-100"}">${esc(o.status)}</span></td>
          <td class="text-right font-bold text-navy">${inr(Number(o.grandTotal || 0))}</td>
        </tr>`).join("") : `<tr><td colspan="4" class="py-4 text-slate-400">No orders yet.</td></tr>`;
    } catch (e) {
      document.getElementById("orders").innerHTML =
        `<tr><td colspan="4" class="py-4 text-red-600">Could not load orders.</td></tr>`;
    }
  }

  async function loadLowStock() {
    try {
      const low = await jlApi("/api/v1/admin/inventory/low-stock");
      document.getElementById("lowstock").innerHTML = low.length ? low.map((p,i) => `
        <div class="flex items-center gap-3 py-2.5 border-t border-slate-100 ${i===0?"border-0":""}">
          <div class="flex-1"><b class="text-navy text-[13px] block">${esc(p.productName)}</b>
            <span class="text-[12px] text-slate-400">reorder at ${p.reorderLevel}</span></div>
          <b class="text-red-600">${p.available} left</b>
        </div>`).join("") : `<div class="text-slate-400 text-sm py-2">All products above reorder level. 🎉</div>`;
    } catch (e) {
      document.getElementById("lowstock").innerHTML =
        `<div class="text-red-600 text-sm py-2">Could not load stock.</div>`;
    }
  }

  // Single page overlay covers all initial dashboard fetches (run in parallel).
  jlWithBusy(() => Promise.all([loadStats(), loadRecentOrders(), loadLowStock()]));
</script>
</body>
</html>
