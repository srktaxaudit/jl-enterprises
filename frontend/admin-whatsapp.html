<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>WhatsApp — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;font-size:14px;outline:none} .inp:focus{border-color:#576cbc} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[720px] mx-auto p-4 md:p-7">
    <h1 class="text-2xl text-navy font-bold mb-1">WhatsApp Offers</h1>
    <p class="text-slate-400 text-sm mb-5">Broadcast a promotional message to customers who have a phone number.</p>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <label class="block text-[13px] font-semibold text-slate-600 mb-1">Message</label>
      <textarea id="message" rows="5" maxlength="1000" class="inp" placeholder="e.g. 🎉 Diwali Sale! Flat 10% off all ACs this week at JL Enterprises."></textarea>
      <div class="flex items-center gap-3 mt-3">
        <label class="flex items-center gap-2 text-sm"><input id="onlyVerified" type="checkbox" /> Only phone-verified customers</label>
        <button id="sendBtn" class="ml-auto bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-5 py-2.5 text-sm">Send broadcast</button>
      </div>
      <p class="text-[12px] text-slate-400 mt-3">
        If WhatsApp credentials aren't configured on the server, this runs in <b>demo mode</b> —
        recipients are counted and logged, but no messages are actually sent.
      </p>
    </div>

    <div id="result" class="hidden bg-white border border-slate-200 rounded-2xl p-5 mt-5"></div>
  </div>

<script src="jl-ui.js"></script>
<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  function flash(t, ok=true){ const el=$("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }

  jlField($("message"), [jlV.required("Enter a message first."), jlV.maxLen(1000)]);

  $("sendBtn").addEventListener("click", async ()=>{
    const message = $("message").value.trim();
    const err = jlV.required("Enter a message first.")(message) || jlV.maxLen(1000)(message);
    if(err){ jlSetError($("message"), err); $("message").focus(); return; }
    jlClearError($("message"));
    if(!(await jlConfirm("Send this broadcast to all matching customers?", {confirmText:"Send"}))) return;
    $("sendBtn").disabled = true; $("sendBtn").textContent = "Sending…";
    try {
      const r = await jlApi("/api/v1/admin/whatsapp/broadcast", { method:"POST", body:{ message, onlyVerified:$("onlyVerified").checked }});
      $("result").classList.remove("hidden");
      $("result").innerHTML = `
        <div class="font-semibold text-navy mb-2">${r.demoMode ? "Demo run (nothing sent)" : "Broadcast complete"}</div>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div><div class="text-2xl font-extrabold text-navy">${r.recipients}</div><div class="text-[12px] text-slate-400">recipients</div></div>
          <div><div class="text-2xl font-extrabold text-green-600">${r.sent}</div><div class="text-[12px] text-slate-400">sent</div></div>
          <div><div class="text-2xl font-extrabold text-red-600">${r.failed}</div><div class="text-[12px] text-slate-400">failed</div></div>
        </div>`;
      jlToast(r.demoMode ? "Demo mode — configure WHATSAPP_TOKEN/PHONE_ID to send for real." : "Broadcast sent.", {type: r.demoMode ? "info" : "success"});
    } catch(e){ flash(e.message||"Broadcast failed", false); }
    finally { $("sendBtn").disabled = false; $("sendBtn").textContent = "Send broadcast"; }
  });

  jlWireLogout("#logoutBtn");
  jlRequireAdmin().then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
  });
</script>
</body>
</html>
