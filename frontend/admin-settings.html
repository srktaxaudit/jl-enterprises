<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Settings — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;font-size:14px;outline:none} .inp:focus{border-color:#576cbc} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[900px] mx-auto p-4 md:p-7">
    <h1 class="text-2xl text-navy font-bold mb-1">Settings</h1>
    <p class="text-slate-400 text-sm mb-5">Business key/value settings (GSTIN, store hours, support number, …).</p>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-6">
      <h2 class="text-navy font-semibold mb-4">Add / update a setting</h2>
      <form id="form" class="flex flex-col sm:flex-row gap-3" novalidate>
        <input id="key" required placeholder="key (e.g. gstin)" class="inp sm:w-48" />
        <input id="value" placeholder="value" class="inp flex-1" />
        <button type="submit" class="bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-5 py-2.5 text-sm">Save</button>
      </form>
    </div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <h2 class="text-navy font-semibold mb-4">Current settings</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-400 text-[12px] uppercase"><th class="py-2">Key</th><th>Value</th><th>Updated</th><th class="text-right">Actions</th></tr></thead>
          <tbody id="rows"><tr><td colspan="4" class="py-4 text-slate-400">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  const fmt = (iso) => { try { return new Date(iso).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}); } catch(_){ return "—"; } };
  function flash(t, ok=true){ const el=$("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }

  async function load(){
    const body = $("rows");
    try {
      const rows = await jlApi("/api/v1/admin/settings");
      body.innerHTML = rows.length ? rows.map(s=>`
        <tr class="border-t border-slate-100">
          <td class="py-2.5 font-semibold text-navy">${esc(s.key)}</td>
          <td class="text-slate-600 break-all">${esc(s.value)}</td>
          <td class="text-slate-400 text-[12px]">${fmt(s.updatedAt)}</td>
          <td class="text-right whitespace-nowrap">
            <button data-edit="${esc(s.key)}" data-val="${esc(s.value)}" class="text-[12px] text-brand mr-2">Edit</button>
            <button data-del="${esc(s.key)}" class="text-[12px] text-red-600">Delete</button>
          </td>
        </tr>`).join("") : `<tr><td colspan="4" class="py-4 text-slate-400">No settings yet.</td></tr>`;
    } catch(e){ body.innerHTML = `<tr><td colspan="4" class="py-4 text-red-600">Could not load (${esc(e.message)}).</td></tr>`; }
  }

  $("form").addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    const key = $("key").value.trim(); if(!key) return;
    try { await jlApi(`/api/v1/admin/settings/${encodeURIComponent(key)}`, {method:"PUT", body:{ value:$("value").value }});
      flash("Setting saved."); $("form").reset(); load(); }
    catch(e){ flash(e.message||"Save failed", false); }
  });

  $("rows").addEventListener("click", async (ev)=>{
    const b = ev.target.closest("button"); if(!b) return;
    if(b.dataset.edit!==undefined && b.dataset.edit!==""){ $("key").value=b.dataset.edit; $("value").value=b.dataset.val; window.scrollTo({top:0,behavior:"smooth"}); return; }
    if(b.dataset.del){ if(!confirm(`Delete setting "${b.dataset.del}"?`)) return;
      try { await jlApi(`/api/v1/admin/settings/${encodeURIComponent(b.dataset.del)}`, {method:"DELETE"}); flash("Deleted."); load(); }
      catch(e){ flash(e.message||"Delete failed", false); } }
  });

  jlWireLogout("#logoutBtn");
  jlRequireSuper().then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    load();
  });
</script>
</body>
</html>
