<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offers &amp; Coupons — JL Enterprises</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316", 600: "#ea580c" }, amber: { DEFAULT: "#fbbf24" } },
    boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<link rel="stylesheet" href="style.css" />
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:#fff; }
  .no-scrollbar::-webkit-scrollbar { display:none; } .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; } </style>
</head>
<body class="text-slate-800">

<div class="bg-navy text-white text-center text-[13px] py-1.5 px-3">🎟️ Save more with JL coupons · 🚚 Free delivery across Tamil Nadu · 💳 EMI &amp; COD</div>

<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
  <div class="max-w-[1440px] mx-auto px-5 flex items-center gap-5 py-3">
    <a href="index.html" class="flex items-center gap-2.5 shrink-0"><div class="w-12 h-10 rounded-lg bg-gradient-to-br from-navy to-brand text-white font-extrabold flex items-center justify-center text-lg">JL</div><div class="leading-tight hidden sm:block"><div class="font-extrabold text-navy">JL ENTERPRISES</div><div class="text-[10px] font-semibold text-slate-400 tracking-wider">HOME APPLIANCES · THOOTHUKUDI</div></div></a>
    <form action="index.html" method="get" class="flex-1 flex bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><input name="q" class="flex-1 bg-transparent px-4 py-2.5 text-sm outline-none text-slate-600" placeholder="Search products…" /><button class="bg-navy text-white px-5 font-semibold text-sm">Search</button></form>
    <nav class="flex items-center gap-4 text-slate-600">
      <a href="service.html" class="hidden sm:flex flex-col items-center text-[11px]"><span class="text-xl">🔧</span>Service</a>
      <a href="signup.html" class="hidden sm:flex flex-col items-center text-[11px]"><span class="text-xl">📝</span>Sign Up</a>
      <a href="login.html" class="hidden sm:flex flex-col items-center text-[11px]"><span class="text-xl">👤</span>Login</a>
      <a href="cart.html" class="relative flex flex-col items-center text-[11px]"><span class="text-xl">🛒</span>Cart<span id="cartBadge" class="hidden absolute -top-1.5 -right-2 bg-orange text-white text-[11px] font-bold w-[18px] h-[18px] rounded-full items-center justify-center">0</span></a>
    </nav>
  </div>
</header>

<main class="min-h-[60vh]"><div class="max-w-[1440px] mx-auto px-5">
  <div class="text-[13px] text-slate-400 my-4"><a href="index.html" class="text-brand">Home</a> / Offers</div>
  <h1 class="text-2xl text-navy font-bold mb-1">🎟️ Offers &amp; Coupons</h1>
  <p class="text-slate-400 text-sm mb-5">Apply these codes at checkout to save on your order.</p>

  <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2 bg-green-50 text-green-700 border border-green-200"></div>
  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-10"></div>
</div></main>

<footer class="bg-navy text-slate-400 mt-9 py-6 text-center text-[13px]">© 2026 JL Enterprises, Thoothukudi · <a href="index.html" class="text-brand">Home</a> · <a href="cart.html" class="text-brand">Cart</a></footer>

<script src="jl-ui.js"></script>
<script src="store.js"></script>
<script src="script.js"></script>
<script src="search.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  function flash(t){ const el=$("msg"); el.textContent=t; el.classList.remove("hidden"); setTimeout(()=>el.classList.add("hidden"), 2500); }
  const discountText = (c) => c.type === "PERCENTAGE" ? (Number(c.value) + "% OFF") : (jlInr(c.value) + " OFF");
  function expiryText(iso){
    if(!iso) return "No expiry";
    try {
      const d = new Date(iso); const days = Math.ceil((d - new Date()) / 86400000);
      const date = d.toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
      return days > 0 ? `Valid until ${date}` + (days <= 7 ? ` · ⏳ ${days} day${days>1?"s":""} left` : "") : "Expired";
    } catch(_) { return ""; }
  }

  function card(c){
    const terms = [];
    if(c.minOrderAmount) terms.push("Min order " + jlInr(c.minOrderAmount));
    if(c.maxDiscount) terms.push("Max discount " + jlInr(c.maxDiscount));
    if(c.firstOrderOnly) terms.push("First order only");
    if(c.perUserLimit) terms.push("Limit " + c.perUserLimit + " per customer");
    terms.push(c.allCategories ? "All categories" : "For " + (c.categories || []).map(x => x.name).join(", "));
    return `
      <div class="border-2 border-dashed border-brand/40 rounded-2xl p-5 bg-gradient-to-br from-white to-brand/5 flex flex-col">
        <div class="flex items-start justify-between gap-2">
          <div>
            <div class="text-2xl font-extrabold text-navy">${discountText(c)}</div>
            <div class="text-[13px] text-slate-500">${jlEsc(c.name || c.description || "Discount coupon")}</div>
          </div>
          <span class="text-2xl">🎟️</span>
        </div>
        <div class="mt-3 flex items-center gap-2">
          <code class="flex-1 text-center font-bold tracking-wider text-navy bg-white border border-slate-300 border-dashed rounded-lg py-2">${jlEsc(c.code)}</code>
          <button data-copy="${jlEsc(c.code)}" class="bg-navy hover:bg-orange text-white text-[13px] font-semibold rounded-lg px-3 py-2">Copy</button>
        </div>
        <div class="text-[12px] text-slate-500 mt-3 space-y-0.5 flex-1">
          ${terms.map(t=>`<div>• ${jlEsc(t)}</div>`).join("")}
          <div class="text-slate-400">${expiryText(c.expiresAt)}</div>
        </div>
        <a href="index.html" class="mt-3 block text-center bg-brand hover:bg-navy text-white font-semibold rounded-lg py-2 text-sm">Shop &amp; Apply</a>
      </div>`;
  }

  (async function load(){
    $("grid").innerHTML = '<div class="col-span-full" style="text-align:center;padding:24px">' + jlSpinnerHTML({ size: 28, label: "Loading offers…" }) + '</div>';
    try {
      const coupons = await JLCheckout.activeCoupons();
      const grid = $("grid");
      grid.innerHTML = (coupons && coupons.length)
        ? coupons.map(card).join("")
        : '<div class="text-slate-400 text-sm col-span-full py-8 text-center">No active offers right now — check back soon! 🎉</div>';
      grid.addEventListener("click", async (e)=>{
        const b = e.target.closest("button[data-copy]"); if(!b) return;
        try { await navigator.clipboard.writeText(b.dataset.copy); jlToast("Copied " + b.dataset.copy + " — apply it at checkout!", { type: "success", title: "Coupon copied" }); }
        catch(_) { jlToast("Coupon code: " + b.dataset.copy, { type: "info" }); }
      });
    } catch(e){ $("grid").innerHTML = '<div class="text-slate-400 text-sm col-span-full">Could not load offers right now. Please refresh.</div>'; }
  })();
</script>
</body>
</html>
