<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Sales Analytics — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316", 600: "#ea580c" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; } </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1100px] mx-auto p-4 md:p-7">
    <div class="flex items-center gap-3 flex-wrap mb-5">
      <div>
        <h1 class="text-2xl text-navy font-bold mb-1">Sales Analytics</h1>
        <p class="text-slate-400 text-sm">Revenue, best-sellers and category mix. Cancelled orders excluded.</p>
      </div>
      <label class="ml-auto text-[12px] text-slate-500">Period
        <select id="range" class="ml-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm">
          <option value="7">Last 7 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="365">Last 12 months</option>
        </select>
      </label>
    </div>

    <!-- Summary cards -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-white border border-slate-200 rounded-2xl p-4">
        <div class="text-[12px] text-slate-400 uppercase font-semibold">Revenue</div>
        <div id="sRevenue" class="text-2xl font-extrabold text-navy mt-1">—</div>
      </div>
      <div class="bg-white border border-slate-200 rounded-2xl p-4">
        <div class="text-[12px] text-slate-400 uppercase font-semibold">Orders</div>
        <div id="sOrders" class="text-2xl font-extrabold text-navy mt-1">—</div>
      </div>
      <div class="bg-white border border-slate-200 rounded-2xl p-4">
        <div class="text-[12px] text-slate-400 uppercase font-semibold">Avg order value</div>
        <div id="sAov" class="text-2xl font-extrabold text-navy mt-1">—</div>
      </div>
    </div>

    <!-- Revenue trend -->
    <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-6">
      <h2 class="text-navy font-semibold mb-3">Revenue trend</h2>
      <div id="trend" class="min-h-[180px]"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Best sellers -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <h2 class="text-navy font-semibold mb-3">Best sellers</h2>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
            <th class="py-2">Product</th><th class="text-right">Units</th><th class="text-right">Revenue</th></tr></thead>
          <tbody id="topRows"><tr><td colspan="3" class="py-4 text-slate-400">—</td></tr></tbody>
        </table></div>
      </div>
      <!-- Category breakdown -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <h2 class="text-navy font-semibold mb-3">Revenue by category</h2>
        <div id="cats" class="space-y-2.5"></div>
      </div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const inr = (n) => "₹" + Math.round(Number(n || 0)).toLocaleString("en-IN");
  const inrShort = (n) => { n = Number(n || 0); if (n >= 1e7) return "₹" + (n/1e7).toFixed(1) + "Cr"; if (n >= 1e5) return "₹" + (n/1e5).toFixed(1) + "L"; if (n >= 1e3) return "₹" + Math.round(n/1e3) + "k"; return "₹" + Math.round(n); };

  function renderTrend(points) {
    const box = $("trend");
    if (!points.length) { box.innerHTML = '<div class="text-slate-400 text-sm py-8 text-center">No data for this period.</div>'; return; }
    const max = Math.max(1, ...points.map(p => Number(p.revenue || 0)));
    const W = 900, H = 180, pad = 4;
    const bw = W / points.length;
    const bars = points.map((p, i) => {
      const v = Number(p.revenue || 0);
      const h = Math.max(v > 0 ? 2 : 0, (v / max) * (H - 24));
      const x = i * bw + pad, y = H - h;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${Math.max(1, bw - pad*2).toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="#576cbc"><title>${esc(p.date)}: ${inr(v)}</title></rect>`;
    }).join("");
    const first = points[0].date, last = points[points.length - 1].date;
    box.innerHTML =
      `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:180px">${bars}</svg>
       <div class="flex justify-between text-[11px] text-slate-400 mt-1"><span>${esc(first)}</span><span>Peak day ${inr(max)}</span><span>${esc(last)}</span></div>`;
  }

  function renderTop(list) {
    $("topRows").innerHTML = list.length ? list.map(p => `
      <tr class="border-t border-slate-100">
        <td class="py-2 text-navy font-medium">${esc(p.name)}</td>
        <td class="text-right text-slate-600">${p.quantity}</td>
        <td class="text-right font-semibold text-navy">${inr(p.revenue)}</td>
      </tr>`).join("") : '<tr><td colspan="3" class="py-4 text-slate-400">No sales in this period.</td></tr>';
  }

  function renderCats(list) {
    const box = $("cats");
    if (!list.length) { box.innerHTML = '<div class="text-slate-400 text-sm py-4">No sales in this period.</div>'; return; }
    const max = Math.max(1, ...list.map(c => Number(c.revenue || 0)));
    box.innerHTML = list.map(c => {
      const pct = Math.round((Number(c.revenue || 0) / max) * 100);
      return `<div>
        <div class="flex justify-between text-[13px] mb-0.5"><span class="text-slate-600">${esc(c.category)}</span><span class="font-semibold text-navy">${inr(c.revenue)}</span></div>
        <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-brand rounded-full" style="width:${pct}%"></div></div>
      </div>`;
    }).join("");
  }

  async function load() {
    const days = $("range").value;
    try {
      const d = await jlApi("/api/v1/admin/dashboard/analytics?days=" + encodeURIComponent(days), { blocking: true, busyMessage: "Loading analytics…" });
      $("sRevenue").textContent = inr(d.totalRevenue);
      $("sOrders").textContent = d.orderCount;
      $("sAov").textContent = inr(d.avgOrderValue);
      renderTrend(d.revenueTrend || []);
      renderTop(d.topProducts || []);
      renderCats(d.categoryBreakdown || []);
    } catch (e) {
      jlToast(e.message || "Couldn't load analytics.", { type: "error" });
    }
  }

  $("range").addEventListener("change", load);
  jlWireLogout("#logoutBtn");
  jlRequireAdmin(["MANAGER"]).then((admin) => {
    const b = $("adminBadge");
    b.textContent = jlDisplayName(admin).split(/[\s@.]+/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join("") || "JL";
    load();
  });
</script>
</body>
</html>
