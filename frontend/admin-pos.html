<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>New Sale (POS) — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316", 600: "#ea580c" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .lbl{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
  .inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;font-size:14px;outline:none} .inp:focus{border-color:#576cbc} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1000px] mx-auto p-4 md:p-7">
    <h1 class="text-2xl text-navy font-bold mb-1">New Sale (Counter / Phone)</h1>
    <p class="text-slate-400 text-sm mb-5">Records a completed cash sale: stock is deducted and the order is marked paid.</p>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div class="grid md:grid-cols-[1.5fr_1fr] gap-6 items-start">
      <!-- LEFT: products + lines -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <h2 class="text-navy font-semibold mb-3">Products</h2>
        <div class="relative">
          <input id="search" class="inp" placeholder="Search product by name / SKU…" autocomplete="off" />
          <div id="results" class="hidden absolute z-20 left-0 right-0 mt-1 max-h-64 overflow-auto bg-white border border-slate-200 rounded-lg shadow-card text-sm"></div>
        </div>
        <div class="overflow-x-auto mt-4">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
              <th class="py-2">Item</th><th class="text-center">Qty</th><th class="text-right">Price</th><th class="text-right">Total</th><th></th></tr></thead>
            <tbody id="lines"><tr><td colspan="5" class="py-5 text-slate-400 text-center">No items yet — search and add products above.</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- RIGHT: customer + totals -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <h2 class="text-navy font-semibold mb-3">Customer</h2>
        <div class="mb-3"><label class="lbl">Name *</label><input id="custName" data-jl="name" class="inp" placeholder="Customer name" /></div>
        <div class="mb-3"><label class="lbl">Mobile *</label><input id="custPhone" data-jl="digits" data-jl-maxlength="10" maxlength="10" inputmode="numeric" class="inp" placeholder="10-digit mobile" /></div>
        <div class="mb-3"><label class="lbl">Notes</label><input id="notes" class="inp" placeholder="Optional" /></div>

        <div class="border-t border-slate-100 pt-3 mt-3 text-sm space-y-1">
          <div class="flex justify-between"><span class="text-slate-500">Subtotal</span><span id="tSub" class="font-semibold text-navy">₹0</span></div>
          <div class="flex justify-between items-center"><span class="text-slate-500">Discount (₹)</span>
            <input id="discount" data-jl="digits" type="number" min="0" class="w-28 text-right rounded border border-slate-300 px-2 py-1 text-sm" value="0" /></div>
          <div class="flex justify-between text-lg font-extrabold text-navy border-t border-slate-100 pt-2 mt-1"><span>Total</span><span id="tGrand">₹0</span></div>
        </div>
        <button id="completeBtn" class="mt-4 w-full bg-navy hover:bg-navy-600 text-white font-bold rounded-lg py-3 text-sm">Complete Sale 🧾</button>
      </div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const inr = (n) => "₹" + Math.round(Number(n || 0)).toLocaleString("en-IN");
  function flash(t, ok=true){ const el=$("msg"); el.textContent=t; el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200"); el.classList.remove("hidden"); }

  let LINES = [];   // { productId, name, sku, price, qty, stock }

  function renderLines() {
    const body = $("lines");
    body.innerHTML = LINES.length ? LINES.map((l, i) => `
      <tr class="border-t border-slate-100">
        <td class="py-2"><div class="font-semibold text-navy">${esc(l.name)}</div><div class="text-[11px] text-slate-400">${esc(l.sku||"")}${l.stock!=null?` · ${l.stock} in stock`:""}</div></td>
        <td class="text-center"><input data-qty="${i}" type="number" min="1" value="${l.qty}" class="w-16 text-center rounded border border-slate-300 px-1 py-1 text-sm" /></td>
        <td class="text-right"><input data-price="${i}" type="number" min="0" step="0.01" value="${l.price}" class="w-24 text-right rounded border border-slate-300 px-1 py-1 text-sm" /></td>
        <td class="text-right font-semibold text-navy">${inr(l.price * l.qty)}</td>
        <td class="text-right"><button data-del="${i}" class="text-red-500 text-sm">✕</button></td>
      </tr>`).join("") : '<tr><td colspan="5" class="py-5 text-slate-400 text-center">No items yet — search and add products above.</td></tr>';
    renderTotals();
  }
  function renderTotals() {
    const sub = LINES.reduce((s, l) => s + Number(l.price) * Number(l.qty), 0);
    let disc = Number($("discount").value) || 0; if (disc > sub) disc = sub;
    $("tSub").textContent = inr(sub);
    $("tGrand").textContent = inr(sub - disc);
  }
  $("discount").addEventListener("input", renderTotals);

  $("lines").addEventListener("input", (e) => {
    const q = e.target.closest("[data-qty]"), p = e.target.closest("[data-price]");
    if (q) { const i = +q.dataset.qty; LINES[i].qty = Math.max(1, parseInt(q.value, 10) || 1); renderTotals(); const tot = q.closest("tr").children[3]; tot.textContent = inr(LINES[i].price * LINES[i].qty); }
    if (p) { const i = +p.dataset.price; LINES[i].price = Math.max(0, Number(p.value) || 0); renderTotals(); const tot = p.closest("tr").children[3]; tot.textContent = inr(LINES[i].price * LINES[i].qty); }
  });
  $("lines").addEventListener("click", (e) => {
    const d = e.target.closest("[data-del]"); if (!d) return;
    LINES.splice(+d.dataset.del, 1); renderLines();
  });

  function addLine(p) {
    const existing = LINES.find((l) => l.productId === p.id);
    if (existing) { existing.qty += 1; } else {
      LINES.push({ productId: p.id, name: p.name, sku: p.sku, price: Number(p.price) || 0, qty: 1, stock: (p.availableStock == null ? null : p.availableStock) });
    }
    renderLines();
  }

  // Product search (debounced, race-guarded).
  let searchSeq = 0, timer;
  async function search(term) {
    const box = $("results"), seq = ++searchSeq;
    if (!term) { box.classList.add("hidden"); box.innerHTML = ""; return; }
    try {
      const page = await jlApi(`/api/v1/admin/products?size=8&search=${encodeURIComponent(term)}`, { blocking: false });
      if (seq !== searchSeq) return;
      const rows = page.content || [];
      box.innerHTML = rows.length ? rows.map((p) => `
        <button type="button" data-pick='${esc(JSON.stringify({ id: p.id, name: p.name, sku: p.sku, price: p.price, availableStock: p.availableStock }))}' class="block w-full text-left px-3 py-2 hover:bg-slate-50">
          <b class="text-navy">${esc(p.name)}</b> <span class="text-slate-400">· ${esc(p.sku||"")} · ${inr(p.price)}</span></button>`).join("")
        : '<div class="px-3 py-2 text-slate-400">No matches.</div>';
      box.classList.remove("hidden");
    } catch (e) { if (seq === searchSeq) { box.innerHTML = `<div class="px-3 py-2 text-red-600">${esc(e.message)}</div>`; box.classList.remove("hidden"); } }
  }
  $("search").addEventListener("input", (e) => { clearTimeout(timer); const v = e.target.value.trim(); timer = setTimeout(() => search(v), 250); });
  $("results").addEventListener("click", (e) => {
    const b = e.target.closest("[data-pick]"); if (!b) return;
    addLine(JSON.parse(b.dataset.pick));
    $("search").value = ""; $("results").classList.add("hidden"); $("results").innerHTML = ""; $("search").focus();
  });
  document.addEventListener("click", (e) => { if (!e.target.closest("#results") && e.target !== $("search")) $("results").classList.add("hidden"); });

  $("completeBtn").addEventListener("click", async () => {
    const name = $("custName").value.trim();
    const phone = $("custPhone").value.replace(/\D/g, "");
    if (!name) { flash("Enter the customer name.", false); return; }
    if (!/^\d{10}$/.test(phone)) { flash("Enter a valid 10-digit mobile number.", false); return; }
    if (!LINES.length) { flash("Add at least one product.", false); return; }
    const body = {
      customerName: name, customerPhone: phone, notes: $("notes").value.trim() || null,
      discount: Number($("discount").value) || 0,
      items: LINES.map((l) => ({ productId: l.productId, quantity: l.qty, unitPrice: l.price })),
    };
    try {
      jlBtn($("completeBtn"), true);
      const order = await jlApi("/api/v1/admin/orders/pos", { method: "POST", body, blocking: true, busyMessage: "Recording sale…" });
      await jlAlert("Sale recorded — order " + (order.orderNumber || "") + " for " + inr(order.grandTotal) + ". Stock updated and marked paid.", { type: "success", title: "Sale complete ✅" });
      LINES = []; $("custName").value = ""; $("custPhone").value = ""; $("notes").value = ""; $("discount").value = "0"; renderLines();
    } catch (e) { flash(e.message || "Could not record the sale.", false); }
    finally { jlBtn($("completeBtn"), false); }
  });

  jlAutoRestrict();
  renderLines();
  jlWireLogout("#logoutBtn");
  jlRequireAdmin(["ORDER_MANAGER"]).then((admin) => {
    $("adminBadge").textContent = jlDisplayName(admin).split(/[\s@.]+/).filter(Boolean).slice(0, 2).map((w) => w[0].toUpperCase()).join("") || "JL";
  });
</script>
</body>
</html>
