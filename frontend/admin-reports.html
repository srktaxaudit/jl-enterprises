<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Financial Reports — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .chip{display:inline-block;font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px}
  .inp{border:1px solid #cbd5e1;border-radius:8px;padding:8px 10px;font-size:13px;outline:none} .inp:focus{border-color:#576cbc}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px}
  .tab{padding:8px 16px;border-radius:9px;font-size:14px;font-weight:600;color:#576cbc;cursor:pointer}
  .tab.active{background:#0b2447;color:#fff} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1150px] mx-auto p-4 md:p-7">
    <div class="mb-4">
      <h1 class="text-2xl text-navy font-bold mb-1">Financial Reports</h1>
      <p class="text-slate-400 text-sm">Trial balance, profit &amp; loss and balance sheet.</p>
    </div>

    <!-- TABS -->
    <div class="flex items-center gap-1 bg-white border border-slate-200 rounded-xl p-1 mb-4 w-fit">
      <button class="tab active" data-tab="tb">Trial Balance</button>
      <button class="tab" data-tab="pnl">Profit &amp; Loss</button>
      <button class="tab" data-tab="bs">Balance Sheet</button>
    </div>

    <!-- CONTROLS -->
    <div class="card flex items-end gap-2 flex-wrap mb-4">
      <label id="asOfWrap" class="text-[12px] text-slate-500">As of<br><input id="asOf" type="date" class="inp" /></label>
      <label id="fromWrap" class="text-[12px] text-slate-500 hidden">From<br><input id="from" type="date" class="inp" /></label>
      <label id="toWrap" class="text-[12px] text-slate-500 hidden">To<br><input id="to" type="date" class="inp" /></label>
      <button id="runBtn" class="bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-4 py-2 text-sm">Run</button>
      <button id="printBtn" class="border border-slate-300 rounded-lg px-4 py-2 text-sm font-semibold text-navy disabled:opacity-40 ml-auto" disabled>🖨 Print / Save PDF</button>
    </div>

    <!-- REPORT BODY -->
    <div id="report" class="bg-white border border-slate-200 rounded-2xl p-5">
      <div class="py-4 text-slate-400 text-center">Choose a report and click Run.</div>
    </div>
  </div>

<script src="jl-ui.js"></script>
<script src="admin.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  const inr = (n) => "₹" + Number(n||0).toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtDate = (iso) => { if(!iso) return "—"; const d = new Date(iso); return isNaN(d) ? esc(iso) : d.toLocaleDateString("en-IN",{dateStyle:"medium"}); };

  let TAB = "tb";
  let LAST_PRINT = null; // { title, html }

  const isoLocal = (d)=> `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

  function setTab(tab){
    TAB = tab;
    document.querySelectorAll(".tab").forEach(t=> t.classList.toggle("active", t.dataset.tab===tab));
    const asOf = tab !== "pnl";
    $("asOfWrap").classList.toggle("hidden", !asOf);
    $("fromWrap").classList.toggle("hidden", asOf);
    $("toWrap").classList.toggle("hidden", asOf);
    $("report").innerHTML = `<div class="py-4 text-slate-400 text-center">Click Run to load this report.</div>`;
    $("printBtn").disabled = true; LAST_PRINT = null;
  }

  // ── Renderers (return HTML string for the on-page card) ──
  function renderTrialBalance(d){
    const rows = (d.rows||[]).map(r=>`<tr class="border-t border-slate-100">
        <td class="py-2 text-navy font-medium whitespace-nowrap">${esc(r.code)}</td>
        <td class="text-slate-600">${esc(r.name)}</td>
        <td class="text-right text-slate-600">${Number(r.debit)?inr(r.debit):"—"}</td>
        <td class="text-right text-slate-600">${Number(r.credit)?inr(r.credit):"—"}</td></tr>`).join("");
    const balanced = Math.abs(Number(d.totalDebit)-Number(d.totalCredit)) < 0.01;
    return `<h2 class="text-navy font-semibold mb-1">Trial Balance</h2>
      <p class="text-slate-400 text-[12px] mb-4">As of ${fmtDate(d.asOf)}</p>
      <div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
          <th class="py-2">Code</th><th>Name</th><th class="text-right">Debit</th><th class="text-right">Credit</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="4" class="py-4 text-slate-400 text-center">No accounts.</td></tr>`}</tbody>
        <tfoot><tr class="border-t-2 border-navy font-bold text-navy">
          <td class="py-3" colspan="2">Total</td>
          <td class="text-right">${inr(d.totalDebit)}</td><td class="text-right">${inr(d.totalCredit)}</td></tr></tfoot>
      </table></div>
      <div class="mt-3 text-sm ${balanced?"text-green-700":"text-red-600"} font-semibold">${balanced?"✓ Balanced":"⚠ Debit and credit totals do not match"}</div>`;
  }

  function renderFinancial(d, opts){
    opts = opts || {};
    const sections = (d.sections||[]).map(sec=>{
      const lines = (sec.lines||[]).map(l=>`<tr class="border-t border-slate-100">
          <td class="py-2 text-slate-400 whitespace-nowrap w-24">${esc(l.code)}</td>
          <td class="text-slate-600">${esc(l.name)}</td>
          <td class="text-right text-slate-600">${inr(l.amount)}</td></tr>`).join("");
      return `<div class="mb-5">
        <h3 class="text-navy font-semibold mb-1">${esc(sec.name)}</h3>
        <table class="w-full text-sm">
          <tbody>${lines || `<tr><td colspan="3" class="py-2 text-slate-400">No entries.</td></tr>`}</tbody>
          <tfoot><tr class="border-t border-slate-300 font-semibold text-navy">
            <td class="py-2" colspan="2">Total ${esc(sec.name)}</td>
            <td class="text-right">${inr(sec.total)}</td></tr></tfoot>
        </table></div>`;
    }).join("");
    const resultVal = Number(d.result);
    let resultTone = "text-navy bg-slate-50 border-slate-200";
    if(opts.pnl){ resultTone = resultVal>=0 ? "text-green-700 bg-green-50 border-green-200" : "text-red-700 bg-red-50 border-red-200"; }
    else { resultTone = Math.abs(resultVal)<0.01 ? "text-green-700 bg-green-50 border-green-200" : "text-red-700 bg-red-50 border-red-200"; }
    const period = opts.pnl ? `${fmtDate(d.from)} → ${fmtDate(d.to)}` : `As of ${fmtDate(d.asOf)}`;
    return `<h2 class="text-navy font-semibold mb-1">${esc(d.title||"")}</h2>
      <p class="text-slate-400 text-[12px] mb-4">${period}</p>
      <div class="overflow-x-auto">${sections}</div>
      <div class="mt-2 flex items-center justify-between border rounded-xl px-4 py-3 font-bold ${resultTone}">
        <span>${esc(d.resultLabel||"Result")}</span><span>${inr(d.result)}</span></div>`;
  }

  // ── Printable versions (plain HTML for new window) ──
  function printTrialBalance(d){
    const rows = (d.rows||[]).map(r=>`<tr>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap">${esc(r.code)}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #eee">${esc(r.name)}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right">${Number(r.debit)?inr(r.debit):"—"}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right">${Number(r.credit)?inr(r.credit):"—"}</td></tr>`).join("");
    return `<div style="font-family:system-ui,sans-serif;color:#0f172a;max-width:760px">
      <div style="font-size:20px;font-weight:800;color:#0b2447">JL Enterprises</div>
      <div style="font-size:16px;font-weight:700;margin-top:4px">Trial Balance</div>
      <div style="font-size:12px;color:#64748b">As of ${fmtDate(d.asOf)}</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:12px">
        <thead><tr style="text-align:left;color:#94a3b8;font-size:11px;text-transform:uppercase">
          <th style="padding:6px 8px">Code</th><th style="padding:6px 8px">Name</th>
          <th style="padding:6px 8px;text-align:right">Debit</th><th style="padding:6px 8px;text-align:right">Credit</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="border-top:2px solid #0b2447;font-weight:800;color:#0b2447">
          <td colspan="2" style="padding:8px">Total</td>
          <td style="padding:8px;text-align:right">${inr(d.totalDebit)}</td>
          <td style="padding:8px;text-align:right">${inr(d.totalCredit)}</td></tr></tfoot>
      </table>
      <p style="font-size:11px;color:#94a3b8;margin-top:16px">Computer-generated report.</p></div>`;
  }

  function printFinancial(d, opts){
    opts = opts || {};
    const sections = (d.sections||[]).map(sec=>{
      const lines = (sec.lines||[]).map(l=>`<tr>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;color:#94a3b8;white-space:nowrap">${esc(l.code)}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee">${esc(l.name)}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;text-align:right">${inr(l.amount)}</td></tr>`).join("");
      return `<h3 style="font-size:14px;color:#0b2447;margin:14px 0 4px">${esc(sec.name)}</h3>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <tbody>${lines}</tbody>
          <tfoot><tr style="border-top:1px solid #cbd5e1;font-weight:700;color:#0b2447">
            <td colspan="2" style="padding:6px 8px">Total ${esc(sec.name)}</td>
            <td style="padding:6px 8px;text-align:right">${inr(sec.total)}</td></tr></tfoot></table>`;
    }).join("");
    const period = opts.pnl ? `${fmtDate(d.from)} → ${fmtDate(d.to)}` : `As of ${fmtDate(d.asOf)}`;
    return `<div style="font-family:system-ui,sans-serif;color:#0f172a;max-width:760px">
      <div style="font-size:20px;font-weight:800;color:#0b2447">JL Enterprises</div>
      <div style="font-size:16px;font-weight:700;margin-top:4px">${esc(d.title||"")}</div>
      <div style="font-size:12px;color:#64748b">${period}</div>
      ${sections}
      <div style="display:flex;justify-content:space-between;border-top:2px solid #0b2447;margin-top:14px;padding-top:8px;font-weight:800;font-size:14px;color:#0b2447">
        <span>${esc(d.resultLabel||"Result")}</span><span>${inr(d.result)}</span></div>
      <p style="font-size:11px;color:#94a3b8;margin-top:16px">Computer-generated report.</p></div>`;
  }

  async function run(){
    const rep = $("report");
    rep.innerHTML = `<div class="py-5 text-center">${jlSpinnerHTML()}</div>`;
    $("printBtn").disabled = true; LAST_PRINT = null;
    try {
      if(TAB==="tb"){
        const d = await jlApi(`/api/v1/admin/accounting/reports/trial-balance?asOf=${encodeURIComponent($("asOf").value)}`);
        rep.innerHTML = renderTrialBalance(d);
        LAST_PRINT = { title: "Trial Balance", html: printTrialBalance(d) };
      } else if(TAB==="pnl"){
        const d = await jlApi(`/api/v1/admin/accounting/reports/pnl?from=${encodeURIComponent($("from").value)}&to=${encodeURIComponent($("to").value)}`);
        rep.innerHTML = renderFinancial(d, { pnl:true });
        LAST_PRINT = { title: d.title || "Profit & Loss", html: printFinancial(d, { pnl:true }) };
      } else {
        const d = await jlApi(`/api/v1/admin/accounting/reports/balance-sheet?asOf=${encodeURIComponent($("asOf").value)}`);
        rep.innerHTML = renderFinancial(d, { pnl:false });
        LAST_PRINT = { title: d.title || "Balance Sheet", html: printFinancial(d, { pnl:false }) };
      }
      $("printBtn").disabled = false;
    } catch(e){
      rep.innerHTML = `<div class="py-4 text-red-600 text-center">Could not load report (${esc(e.message)}).</div>`;
    }
  }

  function printReport(){
    if(!LAST_PRINT){ jlToast("Run a report first.",{type:"warn"}); return; }
    const w = window.open("", "_blank", "width=900,height=1000");
    if(!w){ jlToast("Allow pop-ups to print the report.",{type:"warn"}); return; }
    w.document.write(`<html><head><title>${esc(LAST_PRINT.title)}</title></head><body style="margin:24px">${LAST_PRINT.html}</body></html>`);
    w.document.close(); w.focus(); setTimeout(()=>{ w.print(); }, 300);
  }

  document.querySelectorAll(".tab").forEach(t=> t.addEventListener("click", ()=> setTab(t.dataset.tab)));
  $("runBtn").addEventListener("click", run);
  $("printBtn").addEventListener("click", printReport);

  // defaults: asOf = today; from = start of year, to = today
  (function initDates(){
    const today = new Date();
    $("asOf").value = isoLocal(today);
    $("from").value = isoLocal(new Date(today.getFullYear(), 0, 1));
    $("to").value = isoLocal(today);
  })();

  jlWireLogout("#logoutBtn");
  jlRequireAdmin(["ACCOUNTANT"]).then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    // no initial fetch needed; page is ready. Keep a busy tick for parity/consistency.
    jlWithBusy(()=>Promise.resolve());
  });
</script>
</body>
</html>
