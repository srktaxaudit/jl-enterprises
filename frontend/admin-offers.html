<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Offers & Deals — JL Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
    orange: { DEFAULT: "#f97316" } }, boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<style> body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .lbl{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
  .inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;font-size:14px;outline:none} .inp:focus{border-color:#576cbc} </style>
</head>
<body class="bg-[#eef1f6] min-h-screen text-slate-800">

  <div class="bg-white border-b border-slate-200 px-4 md:px-7 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="admin.html" class="flex items-center gap-2 text-navy">
      <div class="w-9 h-7 rounded bg-navy text-white text-[11px] font-extrabold flex items-center justify-center">JL</div>
      <span class="font-bold text-sm">← Dashboard</span>
    </a>
    <div class="ml-auto flex items-center gap-3">
      <span id="adminBadge" class="w-9 h-9 rounded-full bg-gradient-to-br from-navy-600 to-brand text-white flex items-center justify-center font-bold text-[13px]">··</span>
      <a href="#" id="logoutBtn" class="text-[13px] text-slate-500 hover:text-navy">⎋ Logout</a>
    </div>
  </div>

  <div class="max-w-[1000px] mx-auto p-4 md:p-7">
    <div class="flex items-center gap-3 mb-5">
      <div><h1 class="text-2xl text-navy font-bold mb-1">Offers & Deals</h1>
        <p class="text-slate-400 text-sm">Discount coupons customers can apply at checkout.</p></div>
      <button id="newBtn" class="ml-auto bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-4 py-2 text-sm">+ New coupon</button>
    </div>
    <div id="msg" class="hidden mb-4 text-[13px] rounded-lg px-3 py-2"></div>

    <div id="formCard" class="hidden bg-white border border-slate-200 rounded-2xl p-5 mb-6">
      <h2 id="formTitle" class="text-navy font-semibold mb-4">New coupon</h2>
      <form id="form" class="grid md:grid-cols-3 gap-4" novalidate>
        <input type="hidden" id="cid" />
        <div><label class="lbl">Code *</label><input id="code" required class="inp uppercase" /></div>
        <div><label class="lbl">Type *</label><select id="type" class="inp"><option value="PERCENTAGE">Percentage</option><option value="FIXED">Fixed ₹</option></select></div>
        <div><label class="lbl">Value *</label><input id="value" type="number" step="0.01" required class="inp" /></div>
        <div><label class="lbl">Min order (₹)</label><input id="minOrderAmount" type="number" step="0.01" class="inp" /></div>
        <div><label class="lbl">Max discount (₹)</label><input id="maxDiscount" type="number" step="0.01" class="inp" /></div>
        <div><label class="lbl">Expires at</label><input id="expiresAt" type="datetime-local" class="inp" /></div>
        <div><label class="lbl">Usage limit</label><input id="usageLimit" type="number" class="inp" /></div>
        <div><label class="lbl">Per-user limit</label><input id="perUserLimit" type="number" class="inp" /></div>
        <label class="flex items-center gap-2 text-sm mt-6"><input id="active" type="checkbox" checked /> Active</label>
        <div class="md:col-span-3"><label class="lbl">Description</label><input id="description" maxlength="200" class="inp" /></div>
        <div class="md:col-span-3 flex gap-2">
          <button type="submit" class="bg-navy hover:bg-navy-600 text-white font-semibold rounded-lg px-5 py-2.5 text-sm">Save</button>
          <button type="button" id="cancelBtn" class="text-slate-500 rounded-lg px-4 py-2.5 text-sm border border-slate-300">Cancel</button>
        </div>
      </form>
    </div>

    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <h2 class="text-navy font-semibold mb-4">Coupons</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-400 text-[12px] uppercase">
            <th class="py-2">Code</th><th>Discount</th><th>Min order</th><th>Used</th><th>Active</th><th class="text-right">Actions</th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="py-4 text-slate-400">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

<script src="admin.js"></script>
<script>
  const inr = (n) => "₹" + Math.round(Number(n||0)).toLocaleString("en-IN");
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = (id) => document.getElementById(id);
  let COUPONS = [];

  function flash(t, ok=true){ const el=$("msg"); el.textContent=t;
    el.className="mb-4 text-[13px] rounded-lg px-3 py-2 "+(ok?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200");
    el.classList.remove("hidden"); }
  const discountText = (c) => c.type==="PERCENTAGE" ? `${Number(c.value)}%` : inr(c.value);
  const toLocalInput = (iso) => { if(!iso) return ""; const d=new Date(iso); const p=(n)=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; };

  async function load(){
    const body = $("rows");
    try {
      COUPONS = await jlApi("/api/v1/coupons");
      body.innerHTML = COUPONS.length ? COUPONS.map(c=>`
        <tr class="border-t border-slate-100">
          <td class="py-2.5 font-bold text-navy">${esc(c.code)}</td>
          <td>${discountText(c)}</td>
          <td class="text-slate-500">${c.minOrderAmount?inr(c.minOrderAmount):"—"}</td>
          <td class="text-slate-500">${c.usedCount}${c.usageLimit?" / "+c.usageLimit:""}</td>
          <td>${c.active?'<span class="text-green-600">Active</span>':'<span class="text-slate-400">Off</span>'}</td>
          <td class="text-right whitespace-nowrap">
            <button data-edit="${c.id}" class="text-[12px] text-brand mr-2">Edit</button>
            <button data-del="${c.id}" class="text-[12px] text-red-600">Delete</button>
          </td>
        </tr>`).join("") : `<tr><td colspan="6" class="py-4 text-slate-400">No coupons yet.</td></tr>`;
    } catch(e){ body.innerHTML = `<tr><td colspan="6" class="py-4 text-red-600">Could not load (${esc(e.message)}).</td></tr>`; }
  }

  function showForm(s){ $("formCard").classList.toggle("hidden", !s); if(s) window.scrollTo({top:0,behavior:"smooth"}); }
  function resetForm(){ $("form").reset(); $("cid").value=""; $("active").checked=true; $("formTitle").textContent="New coupon"; }

  $("newBtn").addEventListener("click", ()=>{ resetForm(); showForm(true); });
  $("cancelBtn").addEventListener("click", ()=> showForm(false));

  function edit(id){
    const c = COUPONS.find(x=>x.id===id); if(!c) return;
    $("cid").value=c.id; $("code").value=c.code; $("type").value=c.type; $("value").value=c.value;
    $("minOrderAmount").value=c.minOrderAmount??""; $("maxDiscount").value=c.maxDiscount??"";
    $("usageLimit").value=c.usageLimit??""; $("perUserLimit").value=c.perUserLimit??"";
    $("expiresAt").value=toLocalInput(c.expiresAt); $("active").checked=!!c.active; $("description").value=c.description||"";
    $("formTitle").textContent="Edit: "+c.code; showForm(true);
  }

  $("form").addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    const body = {
      code:$("code").value.trim().toUpperCase(), type:$("type").value, value:$("value").value,
      minOrderAmount:$("minOrderAmount").value||null, maxDiscount:$("maxDiscount").value||null,
      usageLimit:$("usageLimit").value?Number($("usageLimit").value):null,
      perUserLimit:$("perUserLimit").value?Number($("perUserLimit").value):null,
      expiresAt:$("expiresAt").value?new Date($("expiresAt").value).toISOString():null,
      active:$("active").checked, description:$("description").value.trim()||null,
    };
    const id = $("cid").value;
    try {
      if(id) await jlApi(`/api/v1/coupons/${id}`, {method:"PUT", body});
      else await jlApi("/api/v1/coupons", {method:"POST", body});
      flash(id?"Coupon updated.":"Coupon created."); showForm(false); load();
    } catch(e){ flash(e.message||"Save failed", false); }
  });

  $("rows").addEventListener("click", async (ev)=>{
    const b = ev.target.closest("button"); if(!b) return;
    if(b.dataset.edit) return edit(b.dataset.edit);
    if(b.dataset.del){ if(!confirm("Delete this coupon?")) return;
      try { await jlApi(`/api/v1/coupons/${b.dataset.del}`, {method:"DELETE"}); flash("Coupon deleted."); load(); }
      catch(e){ flash(e.message||"Delete failed", false); } }
  });

  jlWireLogout("#logoutBtn");
  jlRequireAdmin().then((a)=>{
    $("adminBadge").textContent = jlDisplayName(a).split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"JL";
    load();
  });
</script>
</body>
</html>
