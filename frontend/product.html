<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product — JL Enterprises</title>
<meta name="description" content="View product details, price, EMI options and reviews at JL Enterprises, Thoothukudi. Easy EMI, COD and free delivery across Tamil Nadu." />
<link rel="canonical" href="https://jlstores.in/product.html" />
<meta name="theme-color" content="#0b2447" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="JL Enterprises" />
<meta property="og:title" content="Product — JL Enterprises" />
<meta property="og:description" content="View product details, price, EMI options and reviews at JL Enterprises, Thoothukudi. Easy EMI, COD and free delivery across Tamil Nadu." />
<meta property="og:url" content="https://jlstores.in/product.html" />
<meta property="og:image" content="https://jlstores.in/og-image.svg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Product — JL Enterprises" />
<meta name="twitter:description" content="View product details, price, EMI options and reviews at JL Enterprises, Thoothukudi. Easy EMI, COD and free delivery across Tamil Nadu." />
<meta name="twitter:image" content="https://jlstores.in/og-image.svg" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { navy: { DEFAULT: "#0b2447", 600: "#19376d" }, brand: { DEFAULT: "#576cbc", sky: "#a5d7e8" },
      orange: { DEFAULT: "#f97316", 600: "#ea580c" }, amber: { DEFAULT: "#fbbf24" } },
    boxShadow: { card: "0 12px 30px rgba(15,23,42,.12)" } } } };
</script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="text-slate-800">

<!-- HEADER -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
  <div class="max-w-[1440px] mx-auto px-5 flex items-center gap-5 py-3">
    <a href="index.html" class="flex items-center gap-2.5 shrink-0">
      <div class="w-12 h-10 rounded-lg bg-gradient-to-br from-navy to-brand text-white font-extrabold flex items-center justify-center text-lg">JL</div>
      <div class="leading-tight hidden sm:block">
        <div class="font-extrabold text-navy">JL ENTERPRISES</div>
        <div class="text-[10px] font-semibold text-slate-400 tracking-wider">HOME APPLIANCES · THOOTHUKUDI</div>
      </div>
    </a>
    <form action="index.html" method="get" class="flex-1 flex bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><input name="q" autocomplete="off" class="flex-1 bg-transparent px-4 py-2.5 text-sm outline-none text-slate-600" placeholder="Search products..." /><button type="submit" class="bg-navy text-white px-5 font-semibold text-sm">Search</button></form>
    <nav class="flex items-center gap-4 text-slate-600">
      <a href="index.html" class="flex flex-col items-center text-[11px]"><span class="text-xl">🏬</span>Store</a>
      <a href="cart.html" class="relative flex flex-col items-center text-[11px]">
        <span class="text-xl">🛒</span>Cart
        <span id="cartBadge" class="hidden absolute -top-1.5 -right-2 bg-orange text-white text-[11px] font-bold w-[18px] h-[18px] rounded-full items-center justify-center">0</span>
      </a>
    </nav>
  </div>
</header>

<main class="max-w-[1200px] mx-auto px-5 py-6 min-h-[60vh]">
  <a href="index.html" class="text-brand text-sm">← Back to store</a>
  <div id="product" class="mt-4 text-slate-400"></div>
</main>

<footer class="bg-navy text-slate-400 mt-9 py-6 text-center text-[13px]">© 2026 JL Enterprises, Thoothukudi</footer>

<script src="jl-ui.js"></script>
<script src="config.js"></script>
<script src="store.js"></script>
<script>
  const inr = (n) => "₹" + Math.round(Number(n || 0)).toLocaleString("en-IN");
  const escAttr = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  // Update the head for THIS product (description/OG/canonical) and inject Product
  // JSON-LD so crawlers that render JS get real product data. Also logs a GA view_item.
  function applyProductSeo(p, slug) {
    try {
      const url = (window.JL_SITE_URL || "https://jlstores.in") + "/product.html?slug=" + encodeURIComponent(slug);
      const desc = (p.shortDescription || (p.name + " at JL Enterprises, Thoothukudi. Easy EMI, COD and free delivery across Tamil Nadu.")).slice(0, 300);
      const img = p.primaryImageUrl || window.JL_OG_IMAGE;
      const set = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };
      set('meta[name="description"]', "content", desc);
      set('link[rel="canonical"]', "href", url);
      set('meta[property="og:title"]', "content", p.name + " — JL Enterprises");
      set('meta[property="og:description"]', "content", desc);
      set('meta[property="og:url"]', "content", url);
      set('meta[property="og:image"]', "content", img);
      set('meta[name="twitter:title"]', "content", p.name + " — JL Enterprises");
      set('meta[name="twitter:description"]', "content", desc);
      set('meta[name="twitter:image"]', "content", img);
      const ld = document.createElement("script");
      ld.type = "application/ld+json";
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org", "@type": "Product",
        name: p.name, sku: p.sku || undefined, image: p.primaryImageUrl || undefined,
        description: desc, brand: p.brandName ? { "@type": "Brand", name: p.brandName } : undefined,
        aggregateRating: (p.reviewCount > 0 && p.averageRating) ? {
          "@type": "AggregateRating", ratingValue: Number(p.averageRating), reviewCount: Number(p.reviewCount)
        } : undefined,
        offers: {
          "@type": "Offer", url: url, priceCurrency: "INR", price: Number(p.price || 0),
          availability: (p.availableStock != null && p.availableStock <= 0)
            ? "https://schema.org/OutOfStock" : "https://schema.org/InStock",
          seller: { "@type": "Organization", name: "JL Enterprises" }
        }
      });
      document.head.appendChild(ld);
      window.jlTrack && jlTrack("view_item", {
        currency: "INR", value: Number(p.price || 0),
        items: [{ item_id: p.id, item_name: p.name, price: Number(p.price || 0) }],
      });
    } catch (_) { /* SEO extras must never break the page */ }
  }

  async function loadProduct() {
    const box = document.getElementById("product");
    box.innerHTML = '<div style="text-align:center;padding:24px">' + jlSpinnerHTML({ size: 28 }) + '</div>';
    const slug = new URLSearchParams(location.search).get("slug");
    if (!slug) { box.innerHTML = '<p class="text-red-500">No product specified.</p>'; return; }
    try {
      const p = await JLStore.productBySlug(slug);
      document.title = p.name + " — JL Enterprises";
      applyProductSeo(p, slug);
      const price = Number(p.price || 0), mrp = Number(p.comparePrice || 0);
      const emoji = JL_CAT_EMOJI[p.categorySlug] || "📦";
      const rating = Math.round(Number(p.averageRating || 0));
      const galleryUrls = (p.images && p.images.length)
        ? p.images.slice().sort((a, b) => (b.primary ? 1 : 0) - (a.primary ? 1 : 0) || (a.sortOrder || 0) - (b.sortOrder || 0)).map((i) => i.url)
        : (p.primaryImageUrl ? [p.primaryImageUrl] : []);
      const media = galleryUrls.length
        ? `<div>
            <img id="galMain" src="${escAttr(galleryUrls[0])}" alt="${escAttr(p.name)}" class="w-full rounded-2xl object-cover" />
            ${galleryUrls.length > 1 ? `<div id="galThumbs" class="flex gap-2 mt-3 flex-wrap">${galleryUrls.map((u, i) => `<button type="button" data-gal="${escAttr(u)}" class="w-16 h-16 rounded-lg overflow-hidden border-2 ${i === 0 ? "border-brand" : "border-transparent"}"><img src="${escAttr(u)}" alt="" class="w-full h-full object-cover" /></button>`).join("")}</div>` : ""}
           </div>`
        : `<div class="h-72 flex items-center justify-center text-8xl bg-gradient-to-br from-slate-50 to-slate-100 rounded-2xl">${emoji}</div>`;
      box.innerHTML = `
        <div class="grid md:grid-cols-2 gap-8 bg-white border border-slate-200 rounded-2xl p-6">
          <div>${media}</div>
          <div>
            <div class="text-[12px] text-slate-400 uppercase font-semibold tracking-wide">${escAttr(p.brandName || "")}</div>
            <h1 class="text-2xl font-bold text-navy mt-1 mb-2">${escAttr(p.name)}</h1>
            <div class="text-amber text-sm mb-3">${"★".repeat(rating)}<span class="text-slate-400"> (${p.reviewCount || 0} reviews)</span></div>
            <div class="flex items-baseline gap-3 mb-1">
              <span class="text-3xl font-extrabold text-navy">${inr(price)}</span>
              ${mrp > price ? `<span class="text-slate-400 line-through">${inr(mrp)}</span>` : ""}
            </div>
            ${p.emiAvailable ? `
            <div class="border border-brand/40 bg-brand/5 rounded-xl p-3 mb-4 text-[13px]">
              <div class="font-semibold text-brand mb-1">💳 EMI Available</div>
              ${(p.emiAmount != null && p.emiMonths) ? `<div class="text-navy font-bold text-[14px]">${inr(p.emiAmount)} per month for ${p.emiMonths} months</div>` : ""}
              ${p.emiDownPayment != null ? `<div class="text-slate-600">Down Payment: ${inr(p.emiDownPayment)}</div>` : ""}
              ${p.emiProcessingFee != null ? `<div class="text-slate-600">Processing Fee: ${inr(p.emiProcessingFee)}</div>` : ""}
              ${p.emiNote ? `<div class="text-slate-500 mt-1">Note: ${escAttr(p.emiNote)}</div>` : ""}
              <button id="emiRequestBtn" type="button" class="mt-2 bg-brand hover:bg-navy text-white font-semibold rounded-lg px-4 py-1.5 text-[12px] transition">Request EMI / Callback</button>
            </div>` : ""}
            <div class="text-[13px] text-brand mb-4">Free delivery in Tamil Nadu</div>
            ${p.shortDescription ? `<p class="text-slate-600 text-sm mb-3">${escAttr(p.shortDescription)}</p>` : ""}
            ${(p.availableStock != null && p.availableStock <= 0)
              ? `<button disabled class="bg-slate-300 text-white font-bold px-6 py-3 rounded-lg text-sm cursor-not-allowed">❌ Out of Stock</button>`
              : `${jlCartControl({ id: p.id, name: p.name, brand: p.brandName || "", emoji, price, stock: (p.availableStock == null ? "" : p.availableStock) }, { variant: "detail" })}
                 ${p.availableStock != null && p.availableStock <= 5 ? `<div class="text-[12px] text-orange-600 font-semibold mt-2">Only ${p.availableStock} left in stock!</div>` : ""}`}
            <div class="mt-3"><button id="wishBtn" type="button" class="inline-flex items-center gap-2 text-sm text-slate-600 hover:text-brand"><span id="wishIcon">🤍</span> <span id="wishLabel">Save to wishlist</span></button></div>
          </div>
        </div>
        ${p.description ? `<div class="bg-white border border-slate-200 rounded-2xl p-6 mt-5">
          <h2 class="text-navy font-semibold mb-2">Description</h2>
          <p class="text-slate-600 text-sm whitespace-pre-line">${escAttr(p.description)}</p></div>` : ""}
        <div class="bg-white border border-slate-200 rounded-2xl p-6 mt-5">
          <h2 class="text-navy font-semibold mb-3">Customer Reviews</h2>
          <div id="reviewList" class="space-y-4 text-sm text-slate-400">Loading reviews…</div>
          <div id="reviewFormWrap" class="mt-5 pt-5 border-t border-slate-100"></div>
        </div>
        <section id="relatedWrap" class="mt-8 hidden">
          <h2 class="text-xl font-bold text-navy mb-4">You may also like</h2>
          <div id="relatedGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>`;
      loadReviews(p.id);
      renderReviewForm(p.id);
      const emiBtn = document.getElementById("emiRequestBtn");
      if (emiBtn) emiBtn.addEventListener("click", () => requestEmi(p));

      // Gallery: swap the main image when a thumbnail is clicked.
      const thumbs = document.getElementById("galThumbs");
      if (thumbs) thumbs.addEventListener("click", (ev) => {
        const b = ev.target.closest("[data-gal]"); if (!b) return;
        document.getElementById("galMain").src = b.dataset.gal;
        thumbs.querySelectorAll("button").forEach((x) => { x.classList.remove("border-brand"); x.classList.add("border-transparent"); });
        b.classList.remove("border-transparent"); b.classList.add("border-brand");
      });

      // Wishlist heart.
      let inWish = false;
      const paintWish = () => { const ic = document.getElementById("wishIcon"), lb = document.getElementById("wishLabel"); if (!ic) return; ic.textContent = inWish ? "❤️" : "🤍"; lb.textContent = inWish ? "Saved to wishlist" : "Save to wishlist"; };
      if (JLCustomer.isLoggedIn()) { try { const w = await JLWishlist.get(); inWish = (w.items || []).some((it) => it.product && it.product.id === p.id); paintWish(); } catch (_) { /* ignore */ } }
      const wishBtn = document.getElementById("wishBtn");
      if (wishBtn) wishBtn.addEventListener("click", async () => {
        if (!JLCustomer.isLoggedIn()) {
          if (await jlConfirm("Log in to save items to your wishlist?", { confirmText: "Log in" }))
            location.href = "login.html?next=" + encodeURIComponent("product.html?slug=" + slug);
          return;
        }
        try {
          if (inWish) { await JLWishlist.remove(p.id); inWish = false; jlToast("Removed from wishlist.", { type: "info" }); }
          else { await JLWishlist.add(p.id); inWish = true; jlToast("Saved to wishlist ❤️", { type: "success" }); }
          paintWish();
        } catch (e) { jlToast(e.message || "Couldn't update wishlist", { type: "error" }); }
      });

      // Related products.
      try {
        const items = await jlPublicApi("/api/v1/products/" + encodeURIComponent(slug) + "/related?limit=8");
        if (items && items.length) {
          document.getElementById("relatedGrid").innerHTML = items.map(jlProductCard).join("");
          document.getElementById("relatedWrap").classList.remove("hidden");
        }
      } catch (_) { /* related is optional */ }
    } catch (e) {
      box.innerHTML = `<p class="text-red-500">${e.status === 404 ? "Product not found." : "Couldn't load this product."}</p>`;
    }
  }

  // "Request EMI / Callback" → collects name + phone and POSTs a public EMI request.
  function requestEmi(p){
    const el = document.createElement("div");
    el.className = "bg-white rounded-2xl p-5 md:p-6";
    el.innerHTML = `
      <h2 class="text-navy font-bold text-lg mb-1">Request EMI</h2>
      <p class="text-slate-500 text-sm mb-4">For <b>${escAttr(p.name)}</b>. Leave your details and our team will call you to arrange EMI.</p>
      <div class="grid gap-3">
        <input id="emiName" maxlength="120" placeholder="Your name *" class="border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        <input id="emiPhone" maxlength="20" placeholder="Mobile number *" class="border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        <input id="emiMonths" type="number" min="1" max="60" placeholder="Preferred months (optional)" class="border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        <button id="emiSubmit" type="button" class="bg-navy hover:bg-brand text-white font-bold px-6 py-2.5 rounded-lg text-sm transition">Submit request</button>
      </div>`;
    const dlg = jlDialog(el, { title: "Request EMI" });
    el.querySelector("#emiSubmit").addEventListener("click", async () => {
      const name = el.querySelector("#emiName").value.trim();
      const phone = el.querySelector("#emiPhone").value.trim();
      if (!name || !phone) { jlToast("Please enter your name and mobile number.", { type:"warn" }); return; }
      const months = el.querySelector("#emiMonths").value ? parseInt(el.querySelector("#emiMonths").value, 10) : null;
      const btn = el.querySelector("#emiSubmit"); btn.disabled = true; btn.textContent = "Sending…";
      try {
        const res = await fetch(JL_API_BASE + "/api/v1/emi-requests", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, phone, productId: p.id, productName: p.name, months })
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || "Could not send"); }
        dlg.close();
        jlToast("EMI request received — our team will call you.", { type:"success" });
      } catch (err) { jlToast(err.message || "Could not send your request.", { type:"error" }); btn.disabled = false; btn.textContent = "Submit request"; }
    });
  }

  const fmtDate = (iso) => { try { return new Date(iso).toLocaleDateString("en-IN", { dateStyle: "medium" }); } catch (_) { return ""; } };

  async function loadReviews(productId) {
    const el = document.getElementById("reviewList");
    el.innerHTML = '<div style="text-align:center;padding:24px">' + jlSpinnerHTML({ size: 22, label: "Loading reviews…" }) + '</div>';
    try {
      const page = await jlPublicApi(`/api/v1/products/${productId}/reviews?size=20`);
      const rows = (page && page.content) || [];
      el.innerHTML = rows.length ? rows.map((r) => `
        <div class="border-b border-slate-100 pb-3 last:border-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-amber text-sm">${"★".repeat(r.rating)}<span class="text-slate-300">${"★".repeat(5 - r.rating)}</span></span>
            ${r.title ? `<b class="text-navy text-sm">${escAttr(r.title)}</b>` : ""}
            ${r.verifiedPurchase ? '<span class="text-[11px] text-green-600 font-semibold">✓ Verified purchase</span>' : ""}
          </div>
          ${r.comment ? `<p class="text-slate-600 text-sm mt-1">${escAttr(r.comment)}</p>` : ""}
          <div class="text-[12px] text-slate-400 mt-1">${escAttr(r.reviewerName || "Customer")} · ${fmtDate(r.createdAt)}</div>
        </div>`).join("") : '<p class="text-slate-400 text-sm">No reviews yet — be the first to review this product!</p>';
    } catch (e) {
      el.innerHTML = '<p class="text-slate-400 text-sm">Could not load reviews.</p>';
    }
  }

  function renderReviewForm(productId) {
    const wrap = document.getElementById("reviewFormWrap");
    if (!JLCustomer.isLoggedIn()) {
      const next = encodeURIComponent("product.html" + location.search);
      wrap.innerHTML = `<p class="text-sm text-slate-500">Want to review this product? <a href="login.html?next=${next}" class="text-brand font-semibold">Log in</a> to write a review.</p>`;
      return;
    }
    wrap.innerHTML = `
      <h3 class="text-navy font-semibold mb-2 text-sm">Write a review</h3>
      <div class="flex items-center gap-1 mb-2" id="starPick">${[1,2,3,4,5].map((n) => `<button type="button" data-star="${n}" class="text-2xl text-slate-300 leading-none">★</button>`).join("")}</div>
      <input id="rvTitle" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-2" placeholder="Title (optional)" maxlength="160" />
      <textarea id="rvComment" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-2" placeholder="Share your experience…" maxlength="2000"></textarea>
      <p id="rvMsg" class="text-[13px] mb-2"></p>
      <button type="button" id="rvSubmit" class="bg-navy hover:bg-orange text-white font-semibold rounded-lg px-5 py-2 text-sm">Submit review</button>`;
    let stars = 0;
    const msg = (t, ok) => { const m = document.getElementById("rvMsg"); m.textContent = t; m.style.color = ok ? "#16a34a" : "#dc2626"; };
    // Real-time length validation on the free-text fields
    jlField(document.getElementById("rvTitle"), [jlV.maxLen(160, "Title must be at most 160 characters.")]);
    jlField(document.getElementById("rvComment"), [jlV.maxLen(2000, "Comment must be at most 2000 characters.")]);
    document.getElementById("starPick").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-star]"); if (!b) return;
      stars = Number(b.dataset.star);
      document.querySelectorAll("#starPick button").forEach((btn, i) => { btn.style.color = i < stars ? "#fbbf24" : "#cbd5e1"; });
    });
    document.getElementById("rvSubmit").addEventListener("click", async () => {
      if (!stars) { msg("Please select a star rating.", false); return; }
      const commentVal = document.getElementById("rvComment").value.trim();
      if (commentVal.length > 2000) { jlSetError(document.getElementById("rvComment"), "Comment must be at most 2000 characters."); return; }
      const btn = document.getElementById("rvSubmit"); btn.disabled = true; const old = btn.textContent; btn.textContent = "Submitting…";
      try {
        await jlAuthApi(`/api/v1/products/${productId}/reviews`, {
          rating: stars,
          title: document.getElementById("rvTitle").value.trim(),
          comment: commentVal,
        });
        msg("Thanks! Your review was submitted and will appear once approved.", true);
        jlToast("Review submitted — it will appear once approved.", { type: "success", title: "Review submitted" });
        document.getElementById("rvTitle").value = ""; document.getElementById("rvComment").value = "";
      } catch (e) {
        msg(e.status === 401 ? "Please log in again to post your review." : (e.message || "Could not submit review."), false);
      }
      btn.disabled = false; btn.textContent = old;
    });
  }

  loadProduct();
</script>
<script src="script.js"></script>
<script src="search.js"></script>
</body>
</html>
