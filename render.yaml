# ────────────────────────────────────────────────────────────────────────
#  Render Blueprint — deploys the JL backend (ecommerce-backend/) using
#  SUPABASE as its Postgres database.
#
#  The backend auto-creates its schema on first boot (Hibernate ddl-auto=update),
#  so nothing is run in the Supabase SQL editor. You only supply the connection
#  string. Render also provisions a Key Value (Redis) store for OTP/tokens.
#
#  DB connection: use Supabase → Project Settings → Database → "Session pooler"
#  (IPv4-compatible and supports prepared statements; do NOT use the Transaction
#  pooler on 6543).
#     DB_URL      = jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
#     DB_USER     = postgres.<project-ref>
#     DB_PASSWORD = <supabase db password>
# ────────────────────────────────────────────────────────────────────────

services:
  # Redis / Key Value (OTP + verification tokens)
  - type: redis
    name: jl-ecom-redis
    plan: free
    ipAllowList: []          # only reachable from Render services

  - type: web
    # Must match the live host every client calls (jl-enterprises-api.onrender.com):
    # frontend/config.js, mobile/app.json, mobile/src/core/config/env.ts, the READMEs.
    name: jl-enterprises-api
    runtime: docker
    rootDir: ecommerce-backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health/liveness   # liveness only — not tied to DB/Redis
    envVars:
      # ── Supabase Postgres (Session pooler) — fill these from the dashboard ──
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_POOL_MAX
        value: "5"           # Supabase free tier has limited connections
      # ── Redis (auto-wired) ──
      - key: REDIS_HOST
        fromService:
          type: redis
          name: jl-ecom-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: jl-ecom-redis
          property: port
      # ── App ──
      # Activates the production profile → StartupConfigValidator fail-fasts on unsafe config
      # (default/short JWT secret, default/blank DB password, weak bootstrap admin password,
      # missing/wildcard/localhost CORS_ORIGINS).
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong random value (>= 32 bytes)
      # EXACT live origins, comma-separated — no wildcards, no localhost. This is the ONLY place
      # production origins are configured; nothing is hardcoded in SecurityConfig.
      # e.g. https://jlstores.in,https://www.jlstores.in
      - key: CORS_ORIGINS
        sync: false
      # Vercel *.vercel.app preview origins stay OFF in production: the pattern matches every
      # vercel.app site, not just ours. To test a preview build against this API, set this to
      # "true" temporarily in the Render dashboard, then set it back to "false".
      - key: APP_SECURITY_CORS_ALLOW_VERCEL_PREVIEWS
        value: "false"
      # Strong, unique initial SUPER_ADMIN password (>= 12 chars, not a known default).
      # Required: production startup fails if this is missing or weak.
      - key: APP_BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      # ── Email (SMTP) — needed for OTP, email verification & password reset ──
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SMTP_AUTH
        value: "true"
      - key: MAIL_STARTTLS
        value: "true"
      - key: MAIL_FROM
        sync: false
      # Where the password-reset email link points (your storefront reset page).
      - key: PASSWORD_RESET_URL
        sync: false
      # ── Supabase Storage — product image uploads (blank = uploads disabled) ──
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: product-images
      # ── Razorpay online payments (blank = COD-only) ──
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # WhatsApp broadcast (optional — demo mode until set)
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      # Entity-development mode. To productionise: freeze the schema into a
      # Flyway V2 migration, then set JPA_DDL_AUTO=validate and FLYWAY_ENABLED=true.
      - key: JPA_DDL_AUTO
        value: update
      - key: FLYWAY_ENABLED
        value: "false"
